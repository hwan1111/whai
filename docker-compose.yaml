# =================================================================
# 최상위 통합 Docker Compose
# 경로: whai/docker-compose.yaml
#
# 단일 whai/.env 를 모든 서비스의 변수 치환(${VAR}) 및
# 컨테이너 환경변수로 사용합니다.
#
# 사용법 (whai/ 디렉토리에서):
#   docker network create whai-network   # 최초 1회
#   docker compose up -d                  # 전체 기동
#   docker compose up -d backend          # 개별 서비스 기동
#
# 개별 compose 파일을 직접 실행할 경우 공통 .env 를 명시하세요:
#   docker compose --env-file ../.env -f backend/docker-compose.yaml up -d
# =================================================================

include:
  - path: postgres/docker-compose.yaml
    env_file: .env
  - path: airflow/docker-compose.yaml
    env_file: .env
  - path: mlflow/docker-compose.yaml
    env_file: .env
  - path: backend/docker-compose.yaml
    env_file: .env
  - path: frontend/docker-compose.yaml
    env_file: .env
