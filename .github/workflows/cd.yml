name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:  # 수동 배포 가능

jobs:
  # 배포 전에 테스트 통과 확인
  test:
    runs-on: ubuntu-22.04
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: |
          pytest test/ -v || python test/test_aiven_connection.py

  # 배포 (EC2 또는 다른 서버)
  deploy:
    needs: test
    runs-on: ubuntu-22.04
    if: success()
    
    environment:
      name: production
      url: https://api.whai.com  # 실제 배포 URL로 수정

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server
        run: |
          # 1단계: SSH 키 설정
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

          # 2단계: 서버에서 코드 업데이트
          ssh -i ~/.ssh/id_rsa ubuntu@${{ secrets.SERVER_HOST }} << 'EOF'
          cd /opt/whai
          git pull origin main
          source venv/bin/activate
          pip install -r requirements.txt
          # 데이터베이스 마이그레이션 (향후 추가)
          # alembic upgrade head
          systemctl restart whai-backend
          EOF

      - name: Verify deployment
        run: |
          # 배포 확인 (헬스 체크)
          for i in {1..30}; do
            if curl -f http://${{ secrets.SERVER_HOST }}/health > /dev/null 2>&1; then
              echo "✅ 배포 성공"
              exit 0
            fi
            echo "⏳ $i/30 재시도..."
            sleep 2
          done
          echo "❌ 배포 실패"
          exit 1

      - name: Slack notification
        if: always()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "${{ job.status == 'success' && '✅' || '❌' }} Production deployment ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*${{ job.status == 'success' && '✅ 배포 성공' || '❌ 배포 실패' }}*\nBranch: main\nCommit: ${{ github.sha }}\nAuthor: ${{ github.actor }}"
                  }
                }
              ]
            }
        continue-on-error: true