name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-22.04
    
    services:
      # MySQL 테스트용 (로컬에서 사용)
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test_db
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Lint with flake8
        run: |
          pip install flake8
          # 현재는 backend/, src/ 폴더만 확인 (아직 코드가 적으므로)
          # F401: 미사용 import, E501: 라인 길이, W503: 라인 뒤 연산자
          flake8 backend/ src/ --max-line-length=120 --extend-ignore=F401,E501,W503 || true
        continue-on-error: true

      - name: Format check with black
        run: |
          pip install black
          black --check backend/ src/ || true
        continue-on-error: true

      - name: Type check with mypy
        run: |
          pip install mypy
          mypy backend/ src/ --ignore-missing-imports || true
        continue-on-error: true

      - name: Run tests
        run: |
          # 테스트가 없으면 연결 테스트만 실행
          pytest test/test_aiven_connection.py -v || python test/test_aiven_connection.py
        env:
          SERVICE_DATABASE_URL: mysql+pymysql://root:root@localhost:3306/test_db
        continue-on-error: true

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
        continue-on-error: true

  security:
    runs-on: ubuntu-22.04
    
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true