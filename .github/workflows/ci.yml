name: CI - Test & Build

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

env:
  AWS_REGION: ap-northeast-2

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run backend tests
        run: |
          if [ -d "test/backend" ]; then
            pytest test/backend -v --cov=backend --cov-report=xml
          else
            echo "⚠ test/backend directory not found, skipping tests"
            python -m py_compile backend/main.py 2>/dev/null || echo "Backend import check skipped"
          fi

      - name: Upload coverage
        if: always()
        continue-on-error: true
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: backend

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests or build
        working-directory: frontend
        run: |
          if npm run | grep -q "test"; then
            npm test -- --coverage
          else
            echo "⚠ npm test script not found, running build instead"
            npm run build
          fi

      - name: Upload coverage
        if: always()
        continue-on-error: true
        uses: codecov/codecov-action@v3
        with:
          flags: frontend

  auto-merge:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Enable auto-merge
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ github.event.pull_request.number }}
          merge-method: squash
          delete-branch: true
