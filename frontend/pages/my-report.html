<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WHAi — 내 리포트</title>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/pages.css">
  <style>
    /* ── Report list ── */
    .report-item { display:flex; align-items:flex-start; gap:14px; padding:14px 0; border-bottom:1px solid #f1f5f9; }
    .report-item:last-child { border-bottom:none; }
    .report-thumb { width:44px; height:44px; border-radius:10px; background:#eff6ff; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
    .report-info { flex:1; min-width:0; }
    .report-name { font-size:14px; font-weight:700; margin-bottom:2px; }
    .report-meta { font-size:11px; color:#64748b; margin-bottom:5px; }
    .report-preview { font-size:12px; color:#475569; line-height:1.5; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .report-actions { display:flex; flex-direction:column; gap:5px; flex-shrink:0; }

    /* ── New report form ── */
    .form-section { margin-bottom:18px; }
    .form-label { font-size:11px; font-weight:700; color:#64748b; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:6px; }
    .form-input { width:100%; padding:9px 12px; border:1px solid #e2e8f0; border-radius:8px; font-size:13px; font-family:inherit; outline:none; box-sizing:border-box; }
    .form-input:focus { border-color:#93c5fd; box-shadow:0 0 0 3px #eff6ff; }
    .add-row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .add-row select, .add-row input[type=number] { padding:8px 10px; border:1px solid #e2e8f0; border-radius:8px; font-size:12px; font-family:inherit; outline:none; }
    .add-row select:focus, .add-row input:focus { border-color:#93c5fd; }
    .add-row select { flex:2; min-width:140px; }
    .add-row input[type=number] { flex:1; min-width:80px; }
    .holding-table { width:100%; border-collapse:collapse; font-size:12px; }
    .holding-table th { text-align:left; padding:6px 8px; font-size:10px; font-weight:700; color:#94a3b8; text-transform:uppercase; letter-spacing:0.4px; border-bottom:1px solid #f1f5f9; }
    .holding-table td { padding:8px 8px; border-bottom:1px solid #f8fafc; vertical-align:middle; }
    .holding-table tr:last-child td { border-bottom:none; }
    .color-dot { width:9px; height:9px; border-radius:50%; display:inline-block; margin-right:5px; flex-shrink:0; }
    .btn-rm { background:none; border:none; cursor:pointer; color:#cbd5e1; font-size:14px; padding:2px 4px; border-radius:4px; }
    .btn-rm:hover { color:#ef4444; background:#fef2f2; }
    .weight-bar-bg { background:#f1f5f9; border-radius:4px; height:5px; flex:1; min-width:50px; }
    .weight-bar-fill { height:5px; border-radius:4px; }

    /* ── Report detail ── */
    .detail-grid { display:grid; grid-template-columns:auto 1fr; gap:20px; align-items:start; }
    @media (max-width:640px) { .detail-grid { grid-template-columns:1fr; } }
    .donut-wrap { display:flex; flex-direction:column; align-items:center; gap:10px; }
    .donut-legend { display:flex; flex-direction:column; gap:5px; font-size:11px; width:100%; }
    .leg-row { display:flex; align-items:center; gap:5px; }
    .leg-pct { margin-left:auto; font-weight:700; color:#374151; }
    .summary-box { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:4px; }
    .sum-item { background:#f8fafc; border-radius:8px; padding:8px 10px; }
    .sum-label { font-size:10px; color:#94a3b8; margin-bottom:2px; }
    .sum-val { font-size:14px; font-weight:800; }
    .detail-table { width:100%; border-collapse:collapse; font-size:12px; }
    .detail-table th { text-align:right; padding:6px 8px; font-size:10px; font-weight:700; color:#94a3b8; text-transform:uppercase; letter-spacing:0.4px; border-bottom:1px solid #f1f5f9; }
    .detail-table th:first-child { text-align:left; }
    .detail-table td { padding:9px 8px; border-bottom:1px solid #f8fafc; text-align:right; vertical-align:middle; }
    .detail-table td:first-child { text-align:left; }
    .detail-table tr:last-child td { border-bottom:none; }
    .detail-total td { background:#f8fafc; font-weight:700; border-top:2px solid #e2e8f0; border-bottom:none !important; }
    .back-btn { display:inline-flex; align-items:center; gap:4px; padding:5px 10px; border-radius:6px; font-size:12px; font-weight:600; color:#64748b; cursor:pointer; background:#f8fafc; border:1px solid #e2e8f0; }
    .back-btn:hover { background:#f1f5f9; }
    .sec-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; gap:10px; flex-wrap:wrap; }
    .sec-title { font-size:17px; font-weight:800; }
    .sec-sub { font-size:11px; color:#64748b; margin-top:2px; }
    .empty-state { text-align:center; padding:40px 0; color:#94a3b8; font-size:13px; }
    .generating-overlay { text-align:center; padding:30px; }
    .spin { animation: spin 1s linear infinite; display:inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="header" id="main-header"></header>
    <div class="content">

      <!-- ① 목록 뷰 -->
      <div id="view-list">
        <div class="sec-header">
          <div>
            <div class="sec-title">내 리포트</div>
            <div class="sec-sub">포트폴리오를 입력하면 AI가 분석 리포트를 생성해드려요</div>
          </div>
          <button class="btn btn-primary" onclick="showView('new')">＋ 새 리포트 작성</button>
        </div>
        <div class="other-card" id="list-container"></div>
      </div>

      <!-- ② 새 리포트 작성 뷰 -->
      <div id="view-new" style="display:none">
        <div class="sec-header">
          <div style="display:flex;align-items:center;gap:10px">
            <div class="back-btn" onclick="showView('list')">← 목록</div>
            <div class="sec-title">새 리포트 작성</div>
          </div>
        </div>
        <div class="other-card">

          <div class="form-section">
            <div class="form-label">리포트 제목</div>
            <input class="form-input" id="report-title" type="text" placeholder="예: 내 메인 포트폴리오" maxlength="40">
          </div>

          <div class="form-section">
            <div class="form-label" style="margin-bottom:8px">보유 자산 추가</div>
            <div class="add-row">
              <select id="add-asset">
                <optgroup label="주식 — 반도체">
                  <option value="005930">삼성전자 (005930)</option>
                  <option value="000660">SK하이닉스 (000660)</option>
                </optgroup>
                <optgroup label="주식 — 자동차">
                  <option value="005380">현대차 (005380)</option>
                  <option value="000270">기아 (000270)</option>
                </optgroup>
                <optgroup label="주식 — 방산">
                  <option value="079550">LIG디펜스앤에어로스페이스 (079550)</option>
                  <option value="012450">한화에어로스페이스 (012450)</option>
                </optgroup>
                <optgroup label="주식 — 금융">
                  <option value="105560">KB금융 (105560)</option>
                  <option value="055550">신한지주 (055550)</option>
                </optgroup>
                <optgroup label="주식 — 화학">
                  <option value="051910">LG화학 (051910)</option>
                  <option value="096770">SK이노베이션 (096770)</option>
                </optgroup>
                <optgroup label="외화 (보유 수량)">
                  <option value="KRW/USD">USD 달러</option>
                  <option value="KRW/JPY">JPY 엔</option>
                  <option value="KRW/EUR">EUR 유로</option>
                  <option value="KRW/CNY">CNY 위안</option>
                  <option value="KRW/CHF">CHF 프랑</option>
                  <option value="KRW/GBP">GBP 파운드</option>
                </optgroup>
              </select>
              <input id="add-qty" type="number" min="0" placeholder="수량" style="width:80px">
              <input id="add-price" type="number" min="0" placeholder="평균 매입가" style="width:120px">
              <button class="btn btn-primary" style="white-space:nowrap" onclick="addHolding()">＋ 추가</button>
            </div>
            <div style="font-size:10px;color:#94a3b8;margin-top:5px">평균 매입가 미입력 시 현재가로 자동 설정됩니다</div>
          </div>

          <div class="form-section">
            <div class="form-label" style="margin-bottom:8px">보유 자산 목록 <span id="holding-count" style="font-weight:400;text-transform:none;color:#94a3b8"></span></div>
            <div id="holdings-empty" style="text-align:center;padding:20px;color:#94a3b8;font-size:12px">
              자산을 추가하면 여기에 표시됩니다
            </div>
            <table class="holding-table" id="holdings-table" style="display:none">
              <thead>
                <tr>
                  <th>종목 / 자산</th>
                  <th style="text-align:right">수량</th>
                  <th style="text-align:right">평균 매입가</th>
                  <th style="text-align:right">현재가</th>
                  <th style="text-align:right">평가액</th>
                  <th style="text-align:right">예상 비중</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="holdings-tbody"></tbody>
            </table>
          </div>

          <div style="border-top:1px solid #f1f5f9;padding-top:14px;display:flex;justify-content:flex-end;gap:8px">
            <button class="btn btn-ghost" onclick="showView('list')">취소</button>
            <button class="btn btn-primary" id="gen-btn" onclick="generateReport()" style="min-width:140px">▶ AI 리포트 생성</button>
          </div>
        </div>
      </div>

      <!-- ③ 리포트 상세 뷰 -->
      <div id="view-detail" style="display:none">
        <div class="sec-header">
          <div style="display:flex;align-items:center;gap:10px">
            <div class="back-btn" onclick="showView('list')">← 목록</div>
            <div>
              <div class="sec-title" id="detail-name"></div>
              <div class="sec-sub" id="detail-date"></div>
            </div>
          </div>
          <button class="btn btn-danger" style="font-size:12px" onclick="deleteCurrentReport()">삭제</button>
        </div>

        <div class="other-card mb">
          <div class="other-card-title">포트폴리오 현황</div>
          <div class="detail-grid">
            <!-- 도넛 차트 + 범례 -->
            <div class="donut-wrap">
              <div id="donut-svg"></div>
              <div class="donut-legend" id="donut-legend"></div>
            </div>
            <!-- 보유 종목 테이블 -->
            <div>
              <table class="detail-table">
                <thead>
                  <tr>
                    <th>종목 / 자산</th>
                    <th>수량</th>
                    <th>평균 매입가</th>
                    <th>현재가</th>
                    <th>평가액</th>
                    <th>손익</th>
                    <th>비중</th>
                  </tr>
                </thead>
                <tbody id="detail-tbody"></tbody>
                <tfoot id="detail-tfoot"></tfoot>
              </table>
              <div class="summary-box" id="summary-box" style="margin-top:12px"></div>
            </div>
          </div>
        </div>

        <div class="other-card">
          <div class="other-card-title">AI 포트폴리오 분석</div>
          <div class="ai-box">
            <div class="ai-header">
              <span class="ai-badge">AI 분석</span>
              <span class="ai-title" id="ai-report-title"></span>
            </div>
            <div class="ai-text" id="ai-report-text"></div>
            <div class="ai-sources" id="ai-report-sources"></div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="../js/auth.js"></script>
<script src="../js/nav.js"></script>
<script>
  initLayout('myreport');

  /* ── 자산 마스터 ── */
  const ASSET_INFO = {
    '005930': { name:'삼성전자',      price:75400,   color:'#dc2626', sector:'반도체', unit:'주' },
    '000660': { name:'SK하이닉스',   price:198500,  color:'#16a34a', sector:'반도체', unit:'주' },
    '005380': { name:'현대차',        price:224000,  color:'#f59e0b', sector:'자동차', unit:'주' },
    '000270': { name:'기아',          price:96500,   color:'#8b5cf6', sector:'자동차', unit:'주' },
    '079550': { name:'LIG디펜스',    price:228000,  color:'#06b6d4', sector:'방산',   unit:'주' },
    '012450': { name:'한화에어로',   price:485000,  color:'#f97316', sector:'방산',   unit:'주' },
    '105560': { name:'KB금융',        price:89300,   color:'#6366f1', sector:'금융',   unit:'주' },
    '055550': { name:'신한지주',      price:56200,   color:'#0d9488', sector:'금융',   unit:'주' },
    '051910': { name:'LG화학',        price:305000,  color:'#ec4899', sector:'화학',   unit:'주' },
    '096770': { name:'SK이노베이션', price:98700,   color:'#84cc16', sector:'화학',   unit:'주' },
    'KRW/USD': { name:'USD 달러',    price:1356.50, color:'#78716c', sector:'외화',   unit:'달러' },
    'KRW/JPY': { name:'JPY 엔',      price:9.02,    color:'#a16207', sector:'외화',   unit:'엔' },
    'KRW/EUR': { name:'EUR 유로',    price:1463.20, color:'#9333ea', sector:'외화',   unit:'유로' },
    'KRW/CNY': { name:'CNY 위안',    price:186.40,  color:'#0891b2', sector:'외화',   unit:'위안' },
    'KRW/CHF': { name:'CHF 프랑',    price:1543.20, color:'#0f766e', sector:'외화',   unit:'프랑' },
    'KRW/GBP': { name:'GBP 파운드', price:1784.50, color:'#b91c1c', sector:'외화',   unit:'파운드' },
  };

  /* ── 숫자 포맷 ── */
  const fmt = n => Math.round(n).toLocaleString('ko-KR');
  function fmtCompact(n) {
    if (n >= 1e8) return `${(n/1e8).toFixed(1)}억원`;
    if (n >= 1e4) return `${Math.round(n/1e4).toLocaleString()}만원`;
    return `${fmt(n)}원`;
  }

  /* ── localStorage 저장소 ── */
  const STORE_KEY = 'whai_reports_v2';
  function loadReports() {
    try { return JSON.parse(localStorage.getItem(STORE_KEY)) || defaultReports(); }
    catch { return defaultReports(); }
  }
  function saveReports(list) { localStorage.setItem(STORE_KEY, JSON.stringify(list)); }

  function defaultReports() {
    return [{
      id: 'demo1',
      title: '내 메인 포트폴리오',
      date: '2026.05.06',
      holdings: [
        { id:'005930', qty:100, avgPrice:70000 },
        { id:'012450', qty:5,   avgPrice:400000 },
        { id:'000660', qty:10,  avgPrice:185000 },
        { id:'051910', qty:3,   avgPrice:320000 },
      ]
    }];
  }

  /* ── 상태 ── */
  let reports = loadReports();
  let newHoldings = [];
  let currentReportId = null;

  /* ── 뷰 전환 ── */
  function showView(v) {
    ['list','new','detail'].forEach(k =>
      document.getElementById(`view-${k}`).style.display = k === v ? '' : 'none'
    );
    if (v === 'list') renderList();
    if (v === 'new') { newHoldings = []; renderNewForm(); }
  }

  /* ── 목록 렌더링 ── */
  function renderList() {
    const el = document.getElementById('list-container');
    if (reports.length === 0) {
      el.innerHTML = '<div class="empty-state">📋 작성된 리포트가 없습니다.<br>새 리포트 작성을 눌러 포트폴리오를 분석해보세요.</div>';
      return;
    }
    el.innerHTML = reports.map(r => {
      const { totalVal, totalCost } = calcTotals(r.holdings);
      const pnl = totalVal - totalCost;
      const pnlPct = totalCost > 0 ? pnl / totalCost * 100 : 0;
      const sign = pnl >= 0 ? '+' : '';
      const pnlColor = pnl >= 0 ? '#16a34a' : '#dc2626';
      const names = r.holdings.slice(0,3).map(h => ASSET_INFO[h.id]?.name || h.id).join(' · ');
      return `
        <div class="report-item">
          <div class="report-thumb">📊</div>
          <div class="report-info">
            <div class="report-name">${r.title}</div>
            <div class="report-meta">${r.date} · ${r.holdings.length}개 자산 · 총 ${fmtCompact(totalVal)}</div>
            <div class="report-preview">${names}${r.holdings.length > 3 ? ' 외 ' + (r.holdings.length-3) + '개' : ''} &nbsp;|&nbsp; <span style="color:${pnlColor};font-weight:700">${sign}${fmt(pnl)}원 (${sign}${pnlPct.toFixed(1)}%)</span></div>
          </div>
          <div class="report-actions">
            <button class="btn btn-ghost" style="font-size:12px" onclick="openDetail('${r.id}')">보기</button>
            <button class="btn btn-danger" style="font-size:12px" onclick="deleteReport('${r.id}')">삭제</button>
          </div>
        </div>`;
    }).join('');
  }

  /* ── 새 리포트 폼 ── */
  function renderNewForm() {
    renderHoldingsTable();
  }

  function addHolding() {
    const id = document.getElementById('add-asset').value;
    const qty = parseFloat(document.getElementById('add-qty').value);
    const priceInput = parseFloat(document.getElementById('add-price').value);
    if (!qty || qty <= 0) { alert('수량을 입력해주세요.'); return; }
    const avgPrice = priceInput > 0 ? priceInput : (ASSET_INFO[id]?.price || 0);
    if (newHoldings.find(h => h.id === id)) {
      const h = newHoldings.find(h => h.id === id);
      // 평균 단가 재계산
      const totalQty = h.qty + qty;
      h.avgPrice = (h.qty * h.avgPrice + qty * avgPrice) / totalQty;
      h.qty = totalQty;
    } else {
      newHoldings.push({ id, qty, avgPrice });
    }
    document.getElementById('add-qty').value = '';
    document.getElementById('add-price').value = '';
    renderHoldingsTable();
  }

  function removeHolding(id) {
    newHoldings = newHoldings.filter(h => h.id !== id);
    renderHoldingsTable();
  }

  function renderHoldingsTable() {
    const isEmpty = newHoldings.length === 0;
    document.getElementById('holdings-empty').style.display = isEmpty ? '' : 'none';
    document.getElementById('holdings-table').style.display = isEmpty ? 'none' : '';
    document.getElementById('holding-count').textContent = isEmpty ? '' : `— ${newHoldings.length}개`;

    const totalVal = newHoldings.reduce((s, h) => s + h.qty * (ASSET_INFO[h.id]?.price || 0), 0);
    document.getElementById('holdings-tbody').innerHTML = newHoldings.map(h => {
      const info = ASSET_INFO[h.id] || {};
      const curPrice = info.price || 0;
      const curVal = h.qty * curPrice;
      const weight = totalVal > 0 ? curVal / totalVal * 100 : 0;
      const pnl = curVal - h.qty * h.avgPrice;
      const pnlColor = pnl >= 0 ? '#16a34a' : '#dc2626';
      return `<tr>
        <td><span class="color-dot" style="background:${info.color||'#94a3b8'}"></span><strong>${info.name||h.id}</strong></td>
        <td style="text-align:right">${fmt(h.qty)}${info.unit||''}</td>
        <td style="text-align:right">${fmt(h.avgPrice)}원</td>
        <td style="text-align:right">${fmt(curPrice)}원</td>
        <td style="text-align:right">${fmt(curVal)}원</td>
        <td style="text-align:right;color:${pnlColor}">${pnl>=0?'+':''}${fmt(pnl)}원</td>
        <td style="text-align:right">
          <div style="display:flex;align-items:center;gap:5px;justify-content:flex-end">
            <span style="white-space:nowrap">${weight.toFixed(1)}%</span>
            <button class="btn-rm" onclick="removeHolding('${h.id}')">×</button>
          </div>
        </td>
      </tr>`;
    }).join('');
  }

  /* ── AI 리포트 생성 ── */
  function generateReport() {
    if (newHoldings.length === 0) { alert('자산을 1개 이상 추가해주세요.'); return; }
    const title = document.getElementById('report-title').value.trim() || '내 포트폴리오';
    const now = new Date();
    const dateStr = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;

    const btn = document.getElementById('gen-btn');
    btn.innerHTML = '<span class="spin">⟳</span> 분석 중...';
    btn.disabled = true;

    setTimeout(() => {
      const report = {
        id: 'r' + Date.now(),
        title,
        date: dateStr,
        holdings: newHoldings.map(h => ({ ...h })),
      };
      reports.unshift(report);
      saveReports(reports);
      btn.innerHTML = '▶ AI 리포트 생성';
      btn.disabled = false;
      openDetail(report.id);
    }, 1200);
  }

  /* ── 상세 뷰 ── */
  function openDetail(id) {
    currentReportId = id;
    const r = reports.find(x => x.id === id);
    if (!r) return;

    showView('detail');
    document.getElementById('detail-name').textContent = r.title;
    document.getElementById('detail-date').textContent = r.date + ' 기준';

    const { totalVal, totalCost, sorted } = calcTotals(r.holdings);
    const totalPnl = totalVal - totalCost;
    const totalPnlPct = totalCost > 0 ? totalPnl / totalCost * 100 : 0;

    renderDonut(sorted, totalVal);
    renderDetailTable(sorted, totalVal, totalCost);
    renderSummary(totalVal, totalCost, totalPnl, totalPnlPct);
    renderAIAnalysis(r.title, sorted, totalVal);
  }

  function calcTotals(holdings) {
    const sorted = holdings.map(h => {
      const info = ASSET_INFO[h.id] || {};
      const curVal = h.qty * (info.price || 0);
      const cost = h.qty * h.avgPrice;
      return { ...h, info, curVal, cost };
    }).sort((a, b) => b.curVal - a.curVal);
    const totalVal = sorted.reduce((s, h) => s + h.curVal, 0);
    const totalCost = sorted.reduce((s, h) => s + h.cost, 0);
    return { totalVal, totalCost, sorted };
  }

  /* ── 도넛 차트 ── */
  function renderDonut(sorted, totalVal) {
    const r = 42, sw = 18, cx = 60, cy = 60;
    const C = 2 * Math.PI * r;
    const gap = 1.5;

    let paths = '', cum = 0;
    sorted.forEach(h => {
      if (h.curVal <= 0) return;
      const frac = h.curVal / totalVal;
      const len = frac * C;
      const segLen = Math.max(len - gap, 0.1);
      paths += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none"
        stroke="${h.info.color||'#94a3b8'}" stroke-width="${sw}"
        stroke-dasharray="${segLen.toFixed(2)} ${C.toFixed(2)}"
        stroke-dashoffset="${(-cum).toFixed(2)}"
        transform="rotate(-90 ${cx} ${cy})"/>`;
      cum += len;
    });

    const centerLabel = fmtCompact(totalVal);
    document.getElementById('donut-svg').innerHTML = `
      <svg viewBox="0 0 120 120" style="width:160px;height:160px">
        <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#f1f5f9" stroke-width="${sw}"/>
        ${paths}
        <text x="${cx}" y="${cy-6}" text-anchor="middle" font-size="8" fill="#94a3b8">총 평가액</text>
        <text x="${cx}" y="${cy+8}" text-anchor="middle" font-size="9.5" font-weight="800" fill="#1e293b">${centerLabel}</text>
      </svg>`;

    document.getElementById('donut-legend').innerHTML = sorted.map(h => {
      const w = totalVal > 0 ? h.curVal / totalVal * 100 : 0;
      return `<div class="leg-row">
        <span class="color-dot" style="background:${h.info.color||'#94a3b8'}"></span>
        <span style="color:#475569">${h.info.name||h.id}</span>
        <span class="leg-pct">${w.toFixed(1)}%</span>
      </div>`;
    }).join('');
  }

  /* ── 상세 테이블 ── */
  function renderDetailTable(sorted, totalVal, totalCost) {
    document.getElementById('detail-tbody').innerHTML = sorted.map(h => {
      const w = totalVal > 0 ? h.curVal / totalVal * 100 : 0;
      const pnl = h.curVal - h.cost;
      const pnlPct = h.cost > 0 ? pnl / h.cost * 100 : 0;
      const pnlColor = pnl >= 0 ? '#16a34a' : '#dc2626';
      return `<tr>
        <td><span class="color-dot" style="background:${h.info.color||'#94a3b8'}"></span><strong>${h.info.name||h.id}</strong></td>
        <td>${fmt(h.qty)}${h.info.unit||''}</td>
        <td>${fmt(h.avgPrice)}원</td>
        <td>${fmt(h.info.price||0)}원</td>
        <td>${fmt(h.curVal)}원</td>
        <td style="color:${pnlColor};font-weight:600">${pnl>=0?'+':''}${fmt(pnl)}원<br><span style="font-size:10px">(${pnl>=0?'+':''}${pnlPct.toFixed(1)}%)</span></td>
        <td>
          <div style="display:flex;align-items:center;gap:5px">
            <div class="weight-bar-bg"><div class="weight-bar-fill" style="width:${Math.min(w,100)}%;background:${h.info.color||'#94a3b8'}"></div></div>
            <span style="white-space:nowrap;font-weight:700">${w.toFixed(1)}%</span>
          </div>
        </td>
      </tr>`;
    }).join('');

    const totalPnl = sorted.reduce((s, h) => s + h.curVal - h.cost, 0);
    const totalPnlPct = totalCost > 0 ? totalPnl / totalCost * 100 : 0;
    const pnlColor = totalPnl >= 0 ? '#16a34a' : '#dc2626';
    document.getElementById('detail-tfoot').innerHTML = `<tr class="detail-total">
      <td colspan="4">합계</td>
      <td>${fmt(totalVal)}원</td>
      <td style="color:${pnlColor}">${totalPnl>=0?'+':''}${fmt(totalPnl)}원<br><span style="font-size:10px">(${totalPnl>=0?'+':''}${totalPnlPct.toFixed(1)}%)</span></td>
      <td>100%</td>
    </tr>`;
  }

  function renderSummary(totalVal, totalCost, totalPnl, totalPnlPct) {
    const sign = totalPnl >= 0 ? '+' : '';
    const pnlColor = totalPnl >= 0 ? '#16a34a' : '#dc2626';
    document.getElementById('summary-box').innerHTML = `
      <div class="sum-item"><div class="sum-label">총 매입 원가</div><div class="sum-val">${fmtCompact(totalCost)}</div></div>
      <div class="sum-item"><div class="sum-label">총 평가액</div><div class="sum-val">${fmtCompact(totalVal)}</div></div>
      <div class="sum-item"><div class="sum-label">총 손익</div><div class="sum-val" style="color:${pnlColor}">${sign}${fmtCompact(Math.abs(totalPnl))}</div></div>
      <div class="sum-item"><div class="sum-label">수익률</div><div class="sum-val" style="color:${pnlColor}">${sign}${totalPnlPct.toFixed(2)}%</div></div>`;
  }

  /* ── AI 분석 텍스트 생성 ── */
  function renderAIAnalysis(title, sorted, totalVal) {
    document.getElementById('ai-report-title').textContent = `${title} 분석`;

    const weights = sorted.map(h => ({
      name: h.info.name || h.id,
      sector: h.info.sector || '기타',
      w: totalVal > 0 ? h.curVal / totalVal * 100 : 0,
      pnlPct: h.cost > 0 ? (h.curVal - h.cost) / h.cost * 100 : 0,
      color: h.info.color || '#94a3b8',
    }));

    const top = weights[0];
    let lines = [];

    // 집중도 경고
    if (top.w >= 50) {
      lines.push(`<strong>⚠️ 단일 종목 집중 위험</strong>: <strong>${top.name}</strong> 비중이 <strong>${top.w.toFixed(1)}%</strong>로 전체의 절반 이상을 차지합니다. 단일 종목 이슈 발생 시 포트폴리오 전체에 큰 영향을 줄 수 있어 비중 축소를 권장합니다.`);
    } else if (top.w >= 35) {
      lines.push(`<strong>📊 비중 점검 권장</strong>: <strong>${top.name}</strong> 비중이 <strong>${top.w.toFixed(1)}%</strong>로 다소 높습니다. 리스크 분산 차원에서 추가 종목 편입을 검토해보세요.`);
    } else {
      lines.push(`<strong>✅ 분산 투자 양호</strong>: 가장 높은 비중의 <strong>${top.name}</strong>이 <strong>${top.w.toFixed(1)}%</strong>로 집중 위험이 낮습니다.`);
    }

    // 섹터 다각화
    const sectors = {};
    weights.forEach(h => { sectors[h.sector] = (sectors[h.sector] || 0) + h.w; });
    const sectorList = Object.entries(sectors).sort((a,b)=>b[1]-a[1]);
    const topSector = sectorList[0];
    if (sectorList.length <= 2 && topSector[1] > 60) {
      lines.push(`<strong>🔍 섹터 쏠림 주의</strong>: 포트폴리오의 <strong>${topSector[1].toFixed(0)}%</strong>가 <strong>${topSector[0]}</strong> 섹터에 집중되어 있습니다. 다른 섹터 편입으로 섹터 리스크를 줄이는 것이 좋습니다.`);
    } else {
      const sectorStr = sectorList.slice(0,3).map(([s,w])=>`${s} ${w.toFixed(0)}%`).join(', ');
      lines.push(`<strong>📈 섹터 구성</strong>: ${sectorStr}${sectorList.length > 3 ? ' 외 ' + (sectorList.length-3) + '개' : ''}. ${sectorList.length >= 3 ? '여러 섹터에 분산되어 있어 안정적인 구성입니다.' : '섹터 다양성을 높이면 변동성을 낮출 수 있습니다.'}`);
    }

    // 손익 파악
    const losers = weights.filter(h => h.pnlPct < 0);
    const gainers = weights.filter(h => h.pnlPct > 0);
    if (losers.length > 0) {
      const worst = losers.sort((a,b)=>a.pnlPct-b.pnlPct)[0];
      lines.push(`<strong>📉 손실 종목 주의</strong>: <strong>${worst.name}</strong>이 <span style="color:#dc2626">${worst.pnlPct.toFixed(1)}%</span> 손실 중입니다. 손절 기준 또는 추가 매수 여부를 검토해보세요.`);
    }
    if (gainers.length > 0) {
      const best = gainers.sort((a,b)=>b.pnlPct-a.pnlPct)[0];
      lines.push(`<strong>📈 수익 종목</strong>: <strong>${best.name}</strong>이 <span style="color:#16a34a">+${best.pnlPct.toFixed(1)}%</span>로 가장 좋은 성과를 보이고 있습니다.`);
    }

    // 종합 의견
    const avgReturn = weights.reduce((s,h)=>s+h.pnlPct*h.w/100,0);
    const opinion = avgReturn > 5 ? '전반적으로 긍정적인 수익률을 기록 중입니다. 수익 실현 시기와 리밸런싱 계획을 수립해보세요.'
      : avgReturn > 0 ? '소폭 플러스 수익률을 유지하고 있습니다. 목표 수익률과 손절선을 명확히 설정하는 것을 권장합니다.'
      : '현재 전체 포트폴리오가 손실 구간입니다. 종목별 상황을 재점검하고 전략을 재수립해보세요.';
    lines.push(`<strong>💡 종합 의견</strong>: ${opinion}`);

    document.getElementById('ai-report-text').innerHTML = lines.map(l => `<p style="margin:0 0 8px;line-height:1.6">${l}</p>`).join('');
    document.getElementById('ai-report-sources').innerHTML = `<span class="ai-src-tag">📊 ${sorted.length}개 자산</span><span class="ai-src-tag">🤖 AI 분석</span><span class="ai-src-tag">📅 ${new Date().toLocaleDateString('ko-KR')} 기준</span>`;
  }

  /* ── 삭제 ── */
  function deleteReport(id) {
    if (!confirm('리포트를 삭제하시겠습니까?')) return;
    reports = reports.filter(r => r.id !== id);
    saveReports(reports);
    renderList();
  }

  function deleteCurrentReport() {
    if (!confirm('이 리포트를 삭제하시겠습니까?')) return;
    reports = reports.filter(r => r.id !== currentReportId);
    saveReports(reports);
    showView('list');
  }

  /* ── 초기 렌더링 ── */
  renderList();
</script>
</body>
</html>
