<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WHAi — 복합 분석</title>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/pages.css">
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="header" id="main-header"></header>
    <div class="content">

      <div class="other-card mb">
        <div class="other-card-title">분석 자산 선택 (KRX 종목)</div>
        <div class="chips" id="analysis-chips"></div>
        <div id="stock-picker" style="display:none;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:10px;margin-bottom:10px">
          <div style="font-size:11px;color:#64748b;margin-bottom:7px">종목 선택</div>
          <div id="picker-options" style="display:flex;flex-wrap:wrap;gap:5px"></div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:12px;color:#64748b">분석 기간:</span>
          <div class="range-sel" id="period-sel">
            <div class="rbtn active" data-p="1W">1주</div>
            <div class="rbtn" data-p="1M">1개월</div>
            <div class="rbtn" data-p="3M">3개월</div>
            <div class="rbtn" data-p="6M">6개월</div>
            <div class="rbtn" data-p="1Y">1년</div>
            <div class="rbtn" data-p="3Y">3년</div>
            <div class="rbtn" data-p="ALL">전체</div>
          </div>
        </div>
      </div>

      <div id="analysis-empty" style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 0;gap:14px">
        <div style="font-size:40px">🧩</div>
        <div style="font-size:15px;font-weight:600;color:#475569">종목을 추가해주세요</div>
        <div style="font-size:12px;color:#94a3b8">2개 이상의 종목을 선택하면 상관계수·리스크 지표·AI 분석이 표시됩니다</div>
      </div>

      <div id="analysis-content" style="display:none">
      <div class="grid g21 mb">
        <div class="other-card">
          <div class="other-card-title">상관계수 매트릭스 <span id="corr-period-label" style="font-size:9px;color:#94a3b8;font-weight:400;text-transform:none">Pearson · 6개월 수익률</span></div>
          <div id="matrix-container"></div>
          <div style="display:flex;gap:10px;margin-top:12px;font-size:10px;color:#64748b;flex-wrap:wrap">
            <span>범례:</span>
            <div style="display:flex;align-items:center;gap:3px"><div style="width:12px;height:12px;background:#1e40af;border-radius:2px"></div>강함(0.7+)</div>
            <div style="display:flex;align-items:center;gap:3px"><div style="width:12px;height:12px;background:#a5b4fc;border-radius:2px"></div>보통(0.4~)</div>
            <div style="display:flex;align-items:center;gap:3px"><div style="width:12px;height:12px;background:#e0e7ff;border-radius:2px"></div>약함(~0.4)</div>
          </div>
        </div>
        <div class="other-card">
          <div class="other-card-title">리스크 · 수익 지표</div>
          <div style="font-size:10px;color:#64748b;margin-bottom:7px" id="return-period-label">수익률</div>
          <div id="returns-container" class="grid g11" style="gap:6px;margin-bottom:12px"></div>
          <div class="divider"></div>
          <div style="font-size:10px;color:#64748b;margin-bottom:9px">
            샤프 비율
            <span style="font-weight:400;color:#94a3b8;margin-left:4px">— 위험 대비 초과 수익</span>
          </div>
          <div id="sharpe-container"></div>
        </div>
      </div>

      <div class="other-card mb">
        <div class="other-card-title">AI 복합 분석</div>
        <div class="ai-box">
          <div class="ai-header">
            <span class="ai-badge">AI 복합 분석</span>
            <span class="ai-title" id="ai-title">종목 통합 인사이트</span>
          </div>
          <div class="ai-text" id="ai-text"></div>
          <div class="ai-sources"><span class="ai-src-tag">📰 뉴스 5건</span><span class="ai-src-tag">📄 리포트 3건</span><span id="ai-src-days" class="ai-src-tag">📊 데이터</span></div>
        </div>
      </div>
      </div><!-- #analysis-content -->

    </div>
  </div>
</div>

<script src="../js/auth.js"></script>
<script src="../js/nav.js"></script>
<script>
  initLayout('analysis');

  const ALL_STOCKS = {
    '005930': '삼성전자',  '000660': 'SK하이닉스',
    '005380': '현대차',    '000270': '기아',
    '079550': 'LIG디펜스앤에어로스페이스', '012450': '한화에어로스페이스',
    '105560': 'KB금융',    '055550': '신한지주',
    '051910': 'LG화학',    '096770': 'SK이노베이션',
  };

  const SHORT = {
    '005930': '삼성전자', '000660': 'SK하이닉스',
    '005380': '현대차',   '000270': '기아',
    '079550': 'LIG디펜스', '012450': '한화에어로',
    '105560': 'KB금융',   '055550': '신한지주',
    '051910': 'LG화학',   '096770': 'SK이노베',
  };

  const PERIOD_LABEL = { '1W':'1주', '1M':'1개월', '3M':'3개월', '6M':'6개월', '1Y':'1년', '3Y':'3년', 'ALL':'전체' };

  const dataCache = {};

  async function fetchHistory(ticker, period) {
    const key = `${ticker}_${period}`;
    if (dataCache[key]) return dataCache[key];
    try {
      const headers = getToken() ? { Authorization: `Bearer ${getToken()}` } : {};
      const res = await fetch(`${API_BASE}/prices/${ticker}/history?period=${period}`, { headers });
      if (!res.ok) return null;
      const rows = await res.json();
      if (rows.length < 2) return null;

      const dates  = rows.map(r => r.date);
      const closes = rows.map(r => Number(r.close));
      const totalReturn = rows[rows.length - 1].return_pct;

      const dailyReturns = [];
      for (let i = 1; i < closes.length; i++)
        dailyReturns.push((closes[i] - closes[i - 1]) / closes[i - 1]);
      const dailyReturnDates = dates.slice(1);

      const result = { dates, closes, dailyReturns, dailyReturnDates, totalReturn, sharpe: calcSharpe(dailyReturns) };
      dataCache[key] = result;
      return result;
    } catch { return null; }
  }

  function calcSharpe(dr) {
    if (dr.length < 2) return 0;
    const mean = dr.reduce((a, b) => a + b, 0) / dr.length;
    const std  = Math.sqrt(dr.reduce((a, b) => a + (b - mean) ** 2, 0) / dr.length);
    return std === 0 ? 0 : parseFloat((mean / std * Math.sqrt(252)).toFixed(2));
  }

  function calcPearson(d1, d2) {
    const map1 = {}, map2 = {};
    d1.dailyReturnDates.forEach((d, i) => { map1[d] = d1.dailyReturns[i]; });
    d2.dailyReturnDates.forEach((d, i) => { map2[d] = d2.dailyReturns[i]; });
    const common = d1.dailyReturnDates.filter(d => map2[d] !== undefined);
    if (common.length < 2) return 0;
    const r1 = common.map(d => map1[d]);
    const r2 = common.map(d => map2[d]);
    const n = r1.length;
    const m1 = r1.reduce((a, b) => a + b, 0) / n;
    const m2 = r2.reduce((a, b) => a + b, 0) / n;
    let num = 0, den1 = 0, den2 = 0;
    for (let i = 0; i < n; i++) {
      const a = r1[i] - m1, b = r2[i] - m2;
      num += a * b; den1 += a * a; den2 += b * b;
    }
    const denom = Math.sqrt(den1 * den2);
    return denom === 0 ? 0 : parseFloat((num / denom).toFixed(2));
  }

  function corrStyle(v) {
    if (v >= 0.99) return 'background:#1e40af;color:white';
    if (v >= 0.7)  return 'background:#3b82f6;color:white';
    if (v >= 0.5)  return 'background:#93c5fd;color:#1e3a8a';
    if (v >= 0.3)  return 'background:#bfdbfe;color:#1e3a8a';
    return 'background:#e0e7ff;color:#3730a3';
  }

  let selected = [];
  let pickerOpen = false;
  let currentPeriod = '1W';

  document.addEventListener('DOMContentLoaded', () => {
    const periodSel = document.getElementById('period-sel');
    if (periodSel) {
      periodSel.addEventListener('click', e => {
        const btn = e.target.closest('[data-p]');
        if (!btn) return;
        currentPeriod = btn.dataset.p;
        document.querySelectorAll('#period-sel [data-p]').forEach(b =>
          b.classList.toggle('active', b === btn)
        );
        renderAll();
      });
    }
  });

  async function renderAll() {
    renderAnalysisChips();
    const hasStocks = selected.length >= 2;
    document.getElementById('analysis-empty').style.display   = hasStocks ? 'none' : 'flex';
    document.getElementById('analysis-content').style.display = hasStocks ? 'block' : 'none';
    if (!hasStocks) return;

    document.getElementById('corr-period-label').textContent  = `Pearson · ${PERIOD_LABEL[currentPeriod]} 수익률`;
    document.getElementById('return-period-label').textContent = `${PERIOD_LABEL[currentPeriod]} 수익률`;
    document.getElementById('ai-src-days').textContent         = `📊 ${PERIOD_LABEL[currentPeriod]} 데이터`;

    const results = await Promise.all(selected.map(id => fetchHistory(id, currentPeriod)));
    const stockData = {};
    selected.forEach((id, i) => { if (results[i]) stockData[id] = results[i]; });

    renderMatrix(stockData);
    renderRiskReturn(stockData);
    renderAI(stockData);
  }

  function renderAnalysisChips() {
    document.getElementById('analysis-chips').innerHTML =
      selected.map(id =>
        `<div class="chip">${ALL_STOCKS[id]} <span class="rm" onclick="removeStock('${id}')">✕</span></div>`
      ).join('') + `<div class="chip chip-add" onclick="togglePicker()">+ 종목 추가</div>`;
  }

  function renderMatrix(stockData) {
    const el = document.getElementById('matrix-container');
    if (!selected.length) {
      el.innerHTML = '<p style="color:#94a3b8;font-size:12px;padding:8px 0">종목을 선택해주세요.</p>';
      return;
    }
    let h = '<table class="matrix-table"><tr><th class="mh"></th>';
    selected.forEach(id => { h += `<th class="mh">${SHORT[id]}</th>`; });
    h += '</tr>';
    selected.forEach(row => {
      h += `<tr><th class="mh" style="text-align:right;padding-right:5px">${SHORT[row]}</th>`;
      selected.forEach(col => {
        if (row === col) {
          h += `<td class="mc" style="background:#f1f5f9;border:1px solid #e2e8f0"></td>`;
        } else if (!stockData[row] || !stockData[col]) {
          h += `<td class="mc" style="background:#f8fafc;color:#94a3b8">—</td>`;
        } else {
          const v = calcPearson(stockData[row], stockData[col]);
          h += `<td class="mc" style="${corrStyle(v)}">${v.toFixed(2)}</td>`;
        }
      });
      h += '</tr>';
    });
    h += '</table>';
    el.innerHTML = h;
  }

  function renderRiskReturn(stockData) {
    document.getElementById('returns-container').innerHTML = selected.map(id => {
      const d = stockData[id];
      if (!d) return `<div class="ret-box" style="background:#f8fafc"><div class="ret-label">${SHORT[id]}</div><div class="ret-value" style="color:#94a3b8">—</div></div>`;
      const r = d.totalReturn, pos = r >= 0;
      return `<div class="ret-box" style="background:${pos?'#f0fdf4':'#fef2f2'}">
        <div class="ret-label">${SHORT[id]}</div>
        <div class="ret-value ${pos?'positive':'negative'}">${pos?'+':''}${r.toFixed(1)}%</div>
      </div>`;
    }).join('');

    const sharpeVals = selected.map(id => stockData[id]?.sharpe ?? 0);
    const maxS = Math.max(...sharpeVals.map(Math.abs), 1);
    document.getElementById('sharpe-container').innerHTML = selected.map((id, i) => {
      if (!stockData[id]) return '';
      const s = sharpeVals[i], pos = s >= 0;
      const pct = Math.min(Math.abs(s) / maxS * 100, 100).toFixed(0);
      return `<div class="factor-row" style="margin-bottom:7px">
        <div class="factor-label" style="width:80px">${SHORT[id]}</div>
        <div class="factor-bar-bg"><div class="factor-fill" style="width:${pct}%;background:${pos?'#2563eb':'#dc2626'}"></div></div>
        <div class="factor-val ${pos?'':'negative'}">${pos?'':'-'}${Math.abs(s).toFixed(2)}</div>
      </div>`;
    }).join('');
  }

  function renderAI(stockData) {
    document.getElementById('ai-title').textContent = `${selected.length}개 종목 통합 인사이트 — ${PERIOD_LABEL[currentPeriod]}`;
    const withData = selected.filter(id => stockData[id]);
    if (withData.length < 2) {
      document.getElementById('ai-text').innerHTML = '데이터를 불러오는 중입니다.';
      return;
    }
    const best  = withData.reduce((a, b) => stockData[a].totalReturn > stockData[b].totalReturn ? a : b);
    const worst = withData.reduce((a, b) => stockData[a].totalReturn < stockData[b].totalReturn ? a : b);
    const pairs = [];
    for (let i = 0; i < withData.length; i++)
      for (let j = i + 1; j < withData.length; j++)
        pairs.push([withData[i], withData[j], calcPearson(stockData[withData[i]], stockData[withData[j]])]);
    pairs.sort((a, b) => a[2] - b[2]);
    const lowCorr  = pairs[0];
    const bestRet  = stockData[best].totalReturn;
    const worstRet = stockData[worst].totalReturn;
    document.getElementById('ai-text').innerHTML =
      `<strong>${SHORT[best]}</strong>(${bestRet >= 0 ? '+' : ''}${bestRet.toFixed(1)}%)이 선택 종목 중 가장 높은 수익률을 기록했습니다. ` +
      `${SHORT[lowCorr[0]]}와 ${SHORT[lowCorr[1]]}의 상관계수는 <strong>${lowCorr[2].toFixed(2)}</strong>로 ` +
      `가장 낮아 분산 효과가 큽니다. ` +
      (worstRet < 0
        ? `<strong>${SHORT[worst]}</strong>(${worstRet.toFixed(1)}%)은 유일하게 손실 구간에 있습니다.`
        : `전 종목이 플러스 수익률을 기록 중입니다.`);
  }

  function renderPicker() {
    const available = Object.entries(ALL_STOCKS).filter(([id]) => !selected.includes(id));
    document.getElementById('picker-options').innerHTML = available.length === 0
      ? '<span style="font-size:12px;color:#94a3b8">추가 가능한 종목 없음</span>'
      : available.map(([id, name]) =>
          `<button class="rbtn" onclick="addStock('${id}')" style="font-size:12px">${name}</button>`
        ).join('');
  }

  function togglePicker() {
    pickerOpen = !pickerOpen;
    document.getElementById('stock-picker').style.display = pickerOpen ? 'block' : 'none';
    if (pickerOpen) renderPicker();
  }

  function removeStock(id) {
    selected = selected.filter(s => s !== id);
    renderAll();
    if (pickerOpen) renderPicker();
  }

  function addStock(id) {
    if (!selected.includes(id)) selected.push(id);
    renderAll();
    togglePicker();
  }

  renderAll();
</script>
</body>
</html>
