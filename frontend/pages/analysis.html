<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WHAi — 복합 분석</title>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/pages.css">
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="header" id="main-header"></header>
    <div class="content">

      <div class="other-card mb">
        <div class="other-card-title">분석 자산 선택 (KRX 종목)</div>
        <div class="chips" id="analysis-chips"></div>
        <div id="stock-picker" style="display:none;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:10px;margin-bottom:10px">
          <div style="font-size:11px;color:#64748b;margin-bottom:7px">종목 선택</div>
          <div id="picker-options" style="display:flex;flex-wrap:wrap;gap:5px"></div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:12px;color:#64748b">분석 기간:</span>
          <div class="range-sel" id="period-sel">
            <div class="rbtn" data-p="1W">1주</div>
            <div class="rbtn" data-p="1M">1개월</div>
            <div class="rbtn" data-p="3M">3개월</div>
            <div class="rbtn active" data-p="6M">6개월</div>
            <div class="rbtn" data-p="1Y">1년</div>
            <div class="rbtn" data-p="3Y">3년</div>
            <div class="rbtn" data-p="ALL">전체</div>
          </div>
          <div style="margin-left:auto"><button class="btn btn-primary" onclick="renderAll()">▶ 분석 실행</button></div>
        </div>
      </div>

      <div class="grid g21 mb">
        <div class="other-card">
          <div class="other-card-title">상관계수 매트릭스 <span id="corr-period-label" style="font-size:9px;color:#94a3b8;font-weight:400;text-transform:none">Pearson · 6개월 일별 수익률</span></div>
          <div id="matrix-container"></div>
          <div style="display:flex;gap:10px;margin-top:12px;font-size:10px;color:#64748b;flex-wrap:wrap">
            <span>범례:</span>
            <div style="display:flex;align-items:center;gap:3px"><div style="width:12px;height:12px;background:#1e40af;border-radius:2px"></div>강함(0.7+)</div>
            <div style="display:flex;align-items:center;gap:3px"><div style="width:12px;height:12px;background:#a5b4fc;border-radius:2px"></div>보통(0.4~)</div>
            <div style="display:flex;align-items:center;gap:3px"><div style="width:12px;height:12px;background:#e0e7ff;border-radius:2px"></div>약함(~0.4)</div>
          </div>
        </div>
        <div class="other-card">
          <div class="other-card-title">리스크 · 수익 지표</div>
          <div style="font-size:10px;color:#64748b;margin-bottom:7px" id="return-period-label">6개월 연환산 수익률</div>
          <div id="returns-container" class="grid g11" style="gap:6px;margin-bottom:12px"></div>
          <div class="divider"></div>
          <div style="font-size:10px;color:#64748b;margin-bottom:9px">
            샤프 비율
            <span style="font-weight:400;color:#94a3b8;margin-left:4px">— 위험 대비 초과 수익</span>
          </div>
          <div id="sharpe-container"></div>
        </div>
      </div>

      <div class="other-card mb">
        <div class="other-card-title">AI 복합 분석</div>
        <div class="ai-box">
          <div class="ai-header">
            <span class="ai-badge">AI 복합 분석</span>
            <span class="ai-title" id="ai-title">종목 통합 인사이트 — 6개월</span>
          </div>
          <div class="ai-text" id="ai-text"></div>
          <div class="ai-sources"><span class="ai-src-tag">📰 뉴스 5건</span><span class="ai-src-tag">📄 리포트 3건</span><span id="ai-src-days" class="ai-src-tag">📊 180일 데이터</span></div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="../js/auth.js"></script>
<script src="../js/nav.js"></script>
<script>
  initLayout('analysis');

  const ALL_STOCKS = {
    '005930': '삼성전자',  '000660': 'SK하이닉스',
    '005380': '현대차',    '000270': '기아',
    '079550': 'LIG디펜스앤에어로스페이스', '012450': '한화에어로스페이스',
    '105560': 'KB금융',    '055550': '신한지주',
    '051910': 'LG화학',    '096770': 'SK이노베이션',
  };

  const SHORT = {
    '005930': '삼성전자', '000660': 'SK하이닉스',
    '005380': '현대차',   '000270': '기아',
    '079550': 'LIG디펜스', '012450': '한화에어로',
    '105560': 'KB금융',   '055550': '신한지주',
    '051910': 'LG화학',   '096770': 'SK이노베',
  };

  /* ── 기간별 수익률 / 샤프 데이터 ── */
  const PERIOD_DATA = {
    '1W': {
      label: '1주', days: 5,
      RETURNS: { '005930':3.9, '000660':9.8, '005380':2.3, '000270':1.5,
                 '079550':9.8,'012450':18.9, '105560':2.1, '055550':1.6, '051910':-2.3,'096770':1.4 },
      SHARPE:  { '005930':1.95,'000660':2.58, '005380':0.85,'000270':0.65,
                 '079550':2.42,'012450':3.28, '105560':1.05,'055550':0.92,'051910':-1.35,'096770':0.75 },
    },
    '1M': {
      label: '1개월', days: 22,
      RETURNS: { '005930':6.2, '000660':10.2, '005380':2.7, '000270':2.0,
                 '079550':12.8,'012450':21.4, '105560':3.4, '055550':2.8, '051910':-4.5,'096770':2.5 },
      SHARPE:  { '005930':1.82,'000660':2.41, '005380':0.71,'000270':0.52,
                 '079550':2.34,'012450':3.12, '105560':0.95,'055550':0.74,'051910':-1.21,'096770':0.61 },
    },
    '3M': {
      label: '3개월', days: 66,
      RETURNS: { '005930':11.5,'000660':22.3, '005380':6.5, '000270':4.8,
                 '079550':30.5,'012450':56.4, '105560':8.2, '055550':6.4, '051910':-7.8,'096770':5.8 },
      SHARPE:  { '005930':1.58,'000660':2.12, '005380':0.76,'000270':0.58,
                 '079550':2.21,'012450':2.98, '105560':1.02,'055550':0.82,'051910':-0.68,'096770':0.51 },
    },
    '6M': {
      label: '6개월', days: 180,
      RETURNS: { '005930':18.4,'000660':28.5, '005380':8.2, '000270':6.1,
                 '079550':38.5,'012450':82.1, '105560':12.3,'055550':9.8, '051910':-8.4,'096770':5.2 },
      SHARPE:  { '005930':1.42,'000660':1.85, '005380':0.82,'000270':0.61,
                 '079550':2.15,'012450':2.71, '105560':1.08,'055550':0.88,'051910':-0.41,'096770':0.42 },
    },
    '1Y': {
      label: '1년', days: 365,
      RETURNS: { '005930':23.1,'000660':36.8, '005380':16.5,'000270':13.8,
                 '079550':72.5,'012450':142.5,'105560':17.8,'055550':15.2,'051910':-18.5,'096770':14.8 },
      SHARPE:  { '005930':1.21,'000660':1.52, '005380':0.88,'000270':0.71,
                 '079550':1.98,'012450':2.42, '105560':1.14,'055550':0.92,'051910':-0.28,'096770':0.58 },
    },
    '3Y': {
      label: '3년', days: 1095,
      RETURNS: { '005930':18.5,'000660':78.5, '005380':42.5,'000270':35.2,
                 '079550':192.8,'012450':358.5, '105560':42.8,'055550':35.5,'051910':-58.2,'096770':28.5 },
      SHARPE:  { '005930':0.98,'000660':1.35, '005380':0.75,'000270':0.62,
                 '079550':1.88,'012450':2.15, '105560':1.02,'055550':0.85,'051910':-0.42,'096770':0.48 },
    },
    'ALL': {
      label: '전체', days: 1825,
      RETURNS: { '005930':45.2,'000660':168.5, '005380':115.8,'000270':98.2,
                 '079550':332.8,'012450':512.5, '105560':95.5,'055550':78.8,'051910':-58.5,'096770':52.5 },
      SHARPE:  { '005930':0.85,'000660':1.22, '005380':0.68,'000270':0.58,
                 '079550':1.75,'012450':1.98, '105560':0.95,'055550':0.78,'051910':-0.35,'096770':0.42 },
    },
  };

  /* ── 상관계수 (기간 무관, 고정) ── */
  const CORR_DATA = {
    '000660-005930':0.72,'005380-005930':0.38,'000270-005930':0.35,
    '005930-079550':0.12,'005930-012450':0.18,'005930-105560':0.33,
    '005930-055550':0.28,'005930-051910':0.49,'005930-096770':0.41,
    '000270-000660':0.31,'000660-005380':0.28,'000660-079550':0.15,
    '000660-012450':0.22,'000660-105560':0.25,'000660-055550':0.21,
    '000660-051910':0.45,'000660-096770':0.38,
    '000270-005380':0.81,'005380-079550':0.21,'005380-012450':0.19,
    '005380-105560':0.42,'005380-055550':0.38,'005380-051910':0.25,
    '005380-096770':0.31,
    '000270-079550':0.18,'000270-012450':0.16,'000270-105560':0.38,
    '000270-055550':0.34,'000270-051910':0.22,'000270-096770':0.28,
    '012450-079550':0.65,'079550-105560':0.14,'055550-079550':0.11,
    '051910-079550':0.08,'079550-096770':0.12,
    '012450-105560':0.17,'012450-055550':0.14,'012450-051910':0.15,
    '012450-096770':0.11,
    '105560-055550':0.76,'051910-105560':0.35,'096770-105560':0.29,
    '051910-055550':0.31,'055550-096770':0.25,
    '051910-096770':0.58,
  };

  function getCorr(a, b) {
    if (a === b) return 1.0;
    return CORR_DATA[[a,b].sort().join('-')] ?? 0.15;
  }

  function corrStyle(v) {
    if (v >= 0.99) return 'background:#1e40af;color:white';
    if (v >= 0.7)  return 'background:#3b82f6;color:white';
    if (v >= 0.5)  return 'background:#93c5fd;color:#1e3a8a';
    if (v >= 0.3)  return 'background:#bfdbfe;color:#1e3a8a';
    return 'background:#e0e7ff;color:#3730a3';
  }

  let selected = ['005930', '012450', '105560', '051910'];
  let pickerOpen = false;
  let currentPeriod = '6M';

  document.addEventListener('DOMContentLoaded', () => {
    const periodSel = document.getElementById('period-sel');
    if (periodSel) {
      periodSel.addEventListener('click', e => {
        const btn = e.target.closest('[data-p]');
        if (!btn) return;
        currentPeriod = btn.dataset.p;
        document.querySelectorAll('#period-sel [data-p]').forEach(b =>
          b.classList.toggle('active', b === btn)
        );
        renderAll();
      });
    }
  });

  function renderAll() {
    const pd = PERIOD_DATA[currentPeriod];
    const labelMap = { '1W':'1주 일별', '1M':'1개월 일별', '3M':'3개월 일별', '6M':'6개월 일별', '1Y':'1년 일별', '3Y':'3년 일별', 'ALL':'전체 연별' };
    document.getElementById('corr-period-label').textContent = `Pearson · ${labelMap[currentPeriod]} 수익률`;
    document.getElementById('return-period-label').textContent = `${pd.label} 수익률`;
    document.getElementById('ai-src-days').textContent = `📊 ${pd.days}일 데이터`;
    renderAnalysisChips();
    renderMatrix();
    renderRiskReturn();
    renderAI();
  }

  function renderAnalysisChips() {
    document.getElementById('analysis-chips').innerHTML =
      selected.map(id =>
        `<div class="chip">${ALL_STOCKS[id]} <span class="rm" onclick="removeStock('${id}')">✕</span></div>`
      ).join('') + `<div class="chip chip-add" onclick="togglePicker()">+ 종목 추가</div>`;
  }

  function renderMatrix() {
    const el = document.getElementById('matrix-container');
    if (selected.length === 0) {
      el.innerHTML = '<p style="color:#94a3b8;font-size:12px;padding:8px 0">종목을 선택해주세요.</p>';
      return;
    }
    let h = '<table class="matrix-table"><tr><th class="mh"></th>';
    selected.forEach(id => { h += `<th class="mh">${SHORT[id]}</th>`; });
    h += '</tr>';
    selected.forEach(row => {
      h += `<tr><th class="mh" style="text-align:right;padding-right:5px">${SHORT[row]}</th>`;
      selected.forEach(col => {
        const v = getCorr(row, col);
        h += `<td class="mc" style="${corrStyle(v)}">${v.toFixed(2)}</td>`;
      });
      h += '</tr>';
    });
    h += '</table>';
    el.innerHTML = h;
  }

  function renderRiskReturn() {
    const { RETURNS, SHARPE } = PERIOD_DATA[currentPeriod];

    document.getElementById('returns-container').innerHTML = selected.map(id => {
      const r = RETURNS[id] ?? 0;
      const pos = r >= 0;
      return `<div class="ret-box" style="background:${pos?'#f0fdf4':'#fef2f2'}">
        <div class="ret-label">${SHORT[id]}</div>
        <div class="ret-value ${pos?'positive':'negative'}">${pos?'+':''}${r.toFixed(1)}%</div>
      </div>`;
    }).join('');

    const maxS = Math.max(...selected.map(id => Math.abs(SHARPE[id] ?? 0)), 1);
    document.getElementById('sharpe-container').innerHTML = selected.map(id => {
      const s = SHARPE[id] ?? 0;
      const pos = s >= 0;
      const pct = Math.min(Math.abs(s) / maxS * 100, 100).toFixed(0);
      return `<div class="factor-row" style="margin-bottom:7px">
        <div class="factor-label" style="width:80px">${SHORT[id]}</div>
        <div class="factor-bar-bg"><div class="factor-fill" style="width:${pct}%;background:${pos?'#2563eb':'#dc2626'}"></div></div>
        <div class="factor-val ${pos?'':'negative'}">${pos?'':'-'}${Math.abs(s).toFixed(2)}</div>
      </div>`;
    }).join('');
  }

  function renderAI() {
    const { RETURNS, label } = PERIOD_DATA[currentPeriod];
    document.getElementById('ai-title').textContent = `${selected.length}개 종목 통합 인사이트 — ${label}`;
    if (selected.length < 2) {
      document.getElementById('ai-text').innerHTML = '종목을 2개 이상 선택하면 AI 분석이 시작됩니다.';
      return;
    }
    const best = selected.reduce((a, b) => (RETURNS[a]??0) > (RETURNS[b]??0) ? a : b);
    const worst = selected.reduce((a, b) => (RETURNS[a]??0) < (RETURNS[b]??0) ? a : b);
    const pairs = [];
    for (let i = 0; i < selected.length; i++)
      for (let j = i + 1; j < selected.length; j++)
        pairs.push([selected[i], selected[j], getCorr(selected[i], selected[j])]);
    pairs.sort((a, b) => a[2] - b[2]);
    const lowCorr = pairs[0];
    const bestRet = RETURNS[best] ?? 0;
    const worstRet = RETURNS[worst] ?? 0;
    document.getElementById('ai-text').innerHTML =
      `<strong>${SHORT[best]}</strong>(${bestRet>=0?'+':''}${bestRet.toFixed(1)}%)이 선택 종목 중 가장 높은 수익률을 기록했습니다. ` +
      `${SHORT[lowCorr[0]]}와 ${SHORT[lowCorr[1]]}의 상관계수는 <strong>${lowCorr[2].toFixed(2)}</strong>로 ` +
      `가장 낮아 분산 효과가 큽니다. ` +
      (worstRet < 0
        ? `<strong>${SHORT[worst]}</strong>(${worstRet.toFixed(1)}%)은 유일하게 손실 구간에 있습니다.`
        : `전 종목이 플러스 수익률을 기록 중입니다.`);
  }

  function renderPicker() {
    const available = Object.entries(ALL_STOCKS).filter(([id]) => !selected.includes(id));
    document.getElementById('picker-options').innerHTML = available.length === 0
      ? '<span style="font-size:12px;color:#94a3b8">추가 가능한 종목 없음</span>'
      : available.map(([id, name]) =>
          `<button class="rbtn" onclick="addStock('${id}')" style="font-size:12px">${name}</button>`
        ).join('');
  }

  function togglePicker() {
    pickerOpen = !pickerOpen;
    document.getElementById('stock-picker').style.display = pickerOpen ? 'block' : 'none';
    if (pickerOpen) renderPicker();
  }

  function removeStock(id) {
    selected = selected.filter(s => s !== id);
    renderAll();
    if (pickerOpen) renderPicker();
  }

  function addStock(id) {
    if (!selected.includes(id)) selected.push(id);
    renderAll();
    togglePicker();
  }

  renderAll();
</script>
</body>
</html>
