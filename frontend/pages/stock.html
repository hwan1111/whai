<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WHAi — 종목 분석</title>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/pages.css">
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="header" id="main-header"></header>
    <div class="content">

      <div class="other-card mb">
        <div style="display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap">
          <div>
            <div style="font-size:10px;color:#64748b;margin-bottom:3px">종목 선택</div>
            <select class="fsel" id="stock-selector" onchange="selectStock(this.value)"></select>
          </div>
        </div>
      </div>

      <!-- 빈 상태 -->
      <div id="stock-empty" style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 0;gap:14px">
        <div style="font-size:40px">📊</div>
        <div style="font-size:15px;font-weight:600;color:#475569">종목을 선택해주세요</div>
        <div style="font-size:12px;color:#94a3b8">위 드롭다운에서 분석할 종목을 선택하면 차트와 지표가 표시됩니다</div>
      </div>

      <!-- 로딩 -->
      <div id="stock-loading" style="display:none;flex-direction:column;align-items:center;justify-content:center;padding:80px 0">
        <div style="font-size:15px;font-weight:600;color:#64748b">데이터를 불러오는 중...</div>
      </div>

      <!-- 콘텐츠 -->
      <div id="stock-content" style="display:none">
      <div class="other-card mb" style="display:flex;align-items:center;justify-content:space-between">
        <div style="display:flex;align-items:center;gap:12px">
          <div class="tk-icon" style="width:46px;height:46px;border-radius:10px;background:#fff;border:1px solid #e8ecf0;padding:3px;overflow:hidden" id="stock-logo">
            <img id="stock-logo-img" src="" alt="" style="width:100%;height:100%;object-fit:contain">
          </div>
          <div>
            <div style="font-size:19px;font-weight:800" id="stock-name">—</div>
            <div style="font-size:11px;color:#64748b;margin-top:2px" id="stock-meta">—</div>
          </div>
        </div>
        <div style="text-align:right">
          <div style="font-size:28px;font-weight:800"><span id="stock-price">—</span> <span style="font-size:13px;color:#94a3b8;font-weight:400">원</span></div>
          <div style="font-size:12px;margin-top:2px" id="stock-change">—</div>
        </div>
      </div>

      <div class="grid g21 mb">
        <div class="other-card">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
            <div style="font-size:13px;font-weight:700">주가 차트 (변동률 기준)</div>
            <div class="range-sel" id="period-sel">
              <div class="rbtn" data-p="1W">1주</div>
              <div class="rbtn" data-p="1M">1개월</div>
              <div class="rbtn active" data-p="3M">3개월</div>
              <div class="rbtn" data-p="6M">6개월</div>
              <div class="rbtn" data-p="1Y">1년</div>
              <div class="rbtn" data-p="3Y">3년</div>
              <div class="rbtn" data-p="ALL">전체</div>
            </div>
          </div>
          <div style="display:flex;gap:12px;align-items:flex-start">
            <div style="flex:1;min-width:0">
              <svg id="stock-chart-svg" viewBox="0 0 500 150" width="100%" height="150" style="display:block"></svg>
              <div id="chart-x-labels" style="display:flex;justify-content:space-around;font-size:10px;color:#94a3b8;margin-top:4px"></div>
            </div>
            <div style="width:88px;flex-shrink:0;padding-top:4px;display:flex;flex-direction:column;gap:7px">
              <div style="font-size:9px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.5px" id="range-label">3개월 범위</div>
              <div>
                <div style="font-size:9px;color:#94a3b8">52주 최고</div>
                <div id="price-high" style="font-size:11px;font-weight:700;color:#dc2626">—</div>
              </div>
              <div>
                <div style="font-size:9px;color:#94a3b8">52주 최저</div>
                <div id="price-low" style="font-size:11px;font-weight:700;color:#2563eb">—</div>
              </div>
              <div>
                <div style="font-size:9px;color:#94a3b8">현재가 위치</div>
                <div id="price-pos" style="font-size:13px;font-weight:800;color:#f97316">—</div>
              </div>
            </div>
          </div>
        </div>
        <div class="other-card">
          <div class="other-card-title">주요 지표</div>
          <div class="grid g11" style="gap:7px;margin-bottom:12px">
            <div class="metric-box"><div class="metric-label">거래량</div><div id="m-volume" class="metric-value">—</div></div>
            <div class="metric-box"><div class="metric-label">시가총액</div><div id="m-mktcap" class="metric-value">—</div></div>
            <div class="metric-box"><div class="metric-label">52주 최고</div><div id="m-high52" class="metric-value positive">—</div></div>
            <div class="metric-box"><div class="metric-label">52주 최저</div><div id="m-low52" class="metric-value negative">—</div></div>
            <div class="metric-box"><div class="metric-label">PER</div><div id="m-per" class="metric-value">—</div></div>
            <div class="metric-box"><div class="metric-label">PBR</div><div id="m-pbr" class="metric-value">—</div></div>
          </div>
        </div>
      </div>

      <div class="other-card mb">
        <div class="other-card-title">AI 해석 — 통계를 쉽게 이해해 드려요</div>
        <div class="ai-box">
          <div class="ai-header">
            <span class="ai-badge">AI 분석</span>
            <span class="ai-title" id="ai-title">—</span>
            <span style="margin-left:auto;font-size:10px;color:#7c6fbb" id="ai-period">—</span>
          </div>
          <div class="ai-text" id="ai-text">종목을 선택하면 AI 분석 내용이 표시됩니다.</div>
          <div class="ai-sources" id="ai-sources"></div>
        </div>
        <div style="margin-top:14px">
          <div style="font-size:11px;font-weight:700;margin-bottom:10px;color:#374151">주가 변동 원인 분석</div>
          <div id="factor-section"></div>
        </div>
      </div>

      <div class="other-card">
        <div class="other-card-title">관련 뉴스</div>
        <div id="stock-news"><div style="color:#94a3b8;font-size:12px;padding:16px 0;text-align:center">종목을 선택하면 뉴스가 표시됩니다.</div></div>
      </div>
      </div><!-- #stock-content -->

    </div><!-- .content -->
  </div><!-- .main -->
</div><!-- .app -->

<script src="../js/auth.js"></script>
<script src="../js/nav.js"></script>
<script src="../js/data.js"></script>

    '051910': { name: 'LG화학', sector: '화학', meta: '코스피 · 화학 · KRX · KRW', logo: 'lgchem.svg',              color: '#A50034',
      factors: [{ label:'시장 전체 (KOSPI)', pct:42, color:'#2563eb', val:'+42%', desc:'KOSPI와 함께 움직인 비율' },
                { label:'배터리 사업 부진',  pct:48, color:'#dc2626', val:'-48%', desc:'EV 배터리 수요 둔화 및 가격 하락' },
                { label:'글로벌 수요 약세',  pct:18, color:'#dc2626', val:'-18%', desc:'화학 제품 수요 둔화' }] },
    '096770': { name: 'SK이노베이션', sector: '화학', meta: '코스피 · 화학 · KRX · KRW', logo: 'skinnovation.svg', color: '#F46F19',
      factors: [{ label:'시장 전체 (KOSPI)', pct:38, color:'#2563eb', val:'+38%', desc:'KOSPI와 함께 움직인 비율' },
                { label:'배터리 수주 증가',  pct:45, color:'#7c3aed', val:'+45%', desc:'북미 배터리 공장 가동률 상승' },
                { label:'유가 변동 영향',    pct:8,  color:'#dc2626', val:'-8%',  desc:'원유 가격 하락 → 화학 부문 수익성 압박' }] },
  };

  const PERIOD_LABELS = {
    '1W':'1주', '1M':'1개월', '3M':'3개월', '6M':'6개월',
    '1Y':'1년', '3Y':'3년', 'ALL':'전체',
  };

  let currentStock = null;
  let currentPeriod = '3M';
  const _apiHeaders = () => getToken() ? { Authorization: `Bearer ${getToken()}` } : {};

  function _showState(state) {
    document.getElementById('stock-empty').style.display   = state === 'empty'   ? 'flex' : 'none';
    document.getElementById('stock-loading').style.display = state === 'loading' ? 'flex' : 'none';
    document.getElementById('stock-content').style.display = state === 'content' ? 'block': 'none';
  }

  function renderStockDropdown() {
    const grouped = {};
    Object.entries(STOCK_CONFIG).forEach(([id, cfg]) => {
      if (!grouped[cfg.sector]) grouped[cfg.sector] = [];
      grouped[cfg.sector].push([id, cfg.name]);
    });
    const sel = document.getElementById('stock-selector');
    sel.innerHTML = `<option value="">종목을 선택하세요</option>` +
      Object.entries(grouped).map(([sector, stocks]) =>
        `<optgroup label="${sector}">${stocks.map(([id, name]) =>
          `<option value="${id}">${name}</option>`).join('')}</optgroup>`
      ).join('');
    sel.value = '';
  }

  async function selectStock(id) {
    if (!id || !STOCK_CONFIG[id]) { _showState('empty'); return; }
    currentStock = id;
    document.getElementById('stock-selector').value = id;
    _showState('loading');
    await new Promise(r => requestAnimationFrame(r));

    const cfg = STOCK_CONFIG[id];
    document.getElementById('stock-name').innerHTML =
      `${cfg.name} <span style="font-size:12px;color:#64748b;font-weight:500">${id}</span>`;
    document.getElementById('stock-meta').textContent = cfg.meta;
    document.getElementById('stock-logo-img').src  = `../assets/logos/${cfg.logo}`;
    document.getElementById('stock-logo-img').alt  = cfg.name;
    document.getElementById('ai-title').textContent = `${cfg.name} 주가 움직임`;
    document.getElementById('price-pos').style.color = cfg.color;

    document.getElementById('factor-section').innerHTML = cfg.factors.map(f => `
      <div class="factor-row"><div class="factor-label">${f.label}</div>
        <div class="factor-bar-bg"><div class="factor-fill" style="width:${f.pct}%;background:${f.color}"></div></div>
        <div class="factor-val ${f.val.startsWith('-') ? 'negative' : 'positive'}">${f.val}</div>
      </div>
      <div class="factor-desc">${f.desc}</div>
    `).join('');

    // Reset dynamic fields
    ['stock-price','stock-change','price-high','price-low','price-pos',
     'm-volume','m-mktcap','m-high52','m-low52','m-per','m-pbr'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.textContent = '—';
    });

    await Promise.all([loadStockPrice(id), loadStockChart(id, currentPeriod), loadStockNews(id)]);
    _showState('content');
  }

  async function loadStockPrice(ticker) {
    try {
      const res = await fetch(`${API_BASE}/prices/latest`, { headers: _apiHeaders() });
      if (!res.ok) return;
      const all = await res.json();
      const row = all.find(r => r.ticker === ticker);
      if (!row) return;

      document.getElementById('stock-price').textContent =
        Number(row.close).toLocaleString('ko-KR');
      const sign = row.change_pct >= 0 ? '▲' : '▼';
      const chgEl = document.getElementById('stock-change');
      chgEl.textContent = `${sign} ${Math.abs(row.change_pct).toFixed(2)}% 오늘`;
      chgEl.style.color  = row.change_pct >= 0 ? '#16a34a' : '#dc2626';
    } catch { /* silent */ }

    try {
      const res = await fetch(`${API_BASE}/prices/${ticker}/stats`, { headers: _apiHeaders() });
      if (!res.ok) return;
      const s = await res.json();
      const fmt = v => v ? Number(v).toLocaleString('ko-KR') : '—';
      const fmtVol = v => {
        if (!v) return '—';
        if (v >= 1_000_000) return (v / 1_000_000).toFixed(1) + 'M';
        if (v >= 1_000)     return (v / 1_000).toFixed(0) + 'K';
        return String(v);
      };
      const fmtCap = v => {
        if (!v) return '—';
        const jo = v / 1e12;
        if (jo >= 1) return jo.toFixed(0) + '조';
        return (v / 1e8).toFixed(0) + '억';
      };
      document.getElementById('m-volume').textContent  = fmtVol(s.volume);
      document.getElementById('m-mktcap').textContent  = fmtCap(s.market_cap);
      document.getElementById('m-high52').textContent  = fmt(s.high52);
      document.getElementById('m-low52').textContent   = fmt(s.low52);
      document.getElementById('m-per').textContent     = s.per  ? s.per.toFixed(2)  : '—';
      document.getElementById('m-pbr').textContent     = s.pbr  ? s.pbr.toFixed(2)  : '—';
      document.getElementById('price-high').textContent = s.high52 ? fmt(s.high52) + '원' : '—';
      document.getElementById('price-low').textContent  = s.low52  ? fmt(s.low52)  + '원' : '—';
    } catch { /* silent */ }
  }

  async function loadStockChart(ticker, period) {
    const svg = document.getElementById('stock-chart-svg');
    svg.innerHTML = `<text x="250" y="75" text-anchor="middle" font-size="11" fill="#94a3b8">불러오는 중...</text>`;
    document.getElementById('range-label').textContent = `${PERIOD_LABELS[period]} 범위`;
    document.getElementById('ai-period').textContent   = `${PERIOD_LABELS[period]} 기준`;

    try {
      const res = await fetch(`${API_BASE}/prices/${ticker}/history?period=${period}`,
        { headers: _apiHeaders() });
      if (!res.ok) { svg.innerHTML = ''; return; }
      const data = await res.json();
      if (!data.length) { svg.innerHTML = `<text x="250" y="75" text-anchor="middle" font-size="11" fill="#94a3b8">데이터 없음</text>`; return; }

      const vals   = data.map(d => d.return_pct);
      const labels = data.map(d => { const [,m,day] = d.date.split('-'); return `${+m}/${+day}`; });
      const color  = STOCK_CONFIG[ticker].color;

      buildChartSvg(vals, labels, color);

      // Price position within 52-week range
      const latest = data[data.length - 1].close;
      const hi = Math.max(...data.map(d => d.close));
      const lo = Math.min(...data.map(d => d.close));
      const pos = hi > lo ? Math.round((latest - lo) / (hi - lo) * 100) : 50;
      document.getElementById('price-pos').textContent = pos + '%';
    } catch { svg.innerHTML = ''; }
  }

  function buildChartSvg(vals, labels, color) {
    const svg = document.getElementById('stock-chart-svg');
    const W=500, H=150, ML=38, MR=8, MT=10, MB=18;
    const CW=W-ML-MR, CH=H-MT-MB;
    const n = vals.length;

    let minV = Math.min(0, ...vals), maxV = Math.max(0, ...vals);
    const pad = Math.max((maxV - minV) * 0.15, 2);
    minV -= pad; maxV += pad;

    const toX = i => ML + (i / (n - 1)) * CW;
    const toY = v => MT + ((maxV - v) / (maxV - minV)) * CH;

    const range = maxV - minV || 1;
    const rawStep = range / 3;
    const mag = Math.pow(10, Math.floor(Math.log10(rawStep)));
    const step = [1,2,5,10].map(s=>s*mag).find(s=>range/s<=4) || mag;
    const ticks = [];
    for (let v = Math.ceil(minV/step)*step; v <= maxV+1e-9; v += step)
      ticks.push(Math.round(v*100)/100);

    let h = `<defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
    </linearGradient></defs>`;

    ticks.forEach(v => {
      const y = toY(v).toFixed(1);
      const isZero = Math.abs(v) < 0.01;
      h += `<line x1="${ML}" y1="${y}" x2="${W-MR}" y2="${y}" stroke="${isZero?'#cbd5e1':'#f1f5f9'}" stroke-width="${isZero?1.5:1}" ${isZero?'stroke-dasharray="4,3"':''}/>`;
      const lbl = (v>=0?'+':'')+v.toFixed(v%1===0?0:1)+'%';
      h += `<text x="${ML-3}" y="${(+y+3.5).toFixed(1)}" text-anchor="end" font-size="9" fill="${isZero?'#475569':'#94a3b8'}" font-weight="${isZero?600:400}">${lbl}</text>`;
    });

    const pts  = vals.map((v,i)=>`${toX(i).toFixed(1)},${toY(v).toFixed(1)}`).join(' ');
    const zeroY = toY(0).toFixed(1);
    const x0 = toX(0).toFixed(1), xN = toX(n-1).toFixed(1);
    const lastY = toY(vals[n-1]).toFixed(1);

    h += `<polygon points="${pts} ${xN},${zeroY} ${x0},${zeroY}" fill="url(#sg)"/>`;
    h += `<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>`;
    h += `<circle cx="${xN}" cy="${lastY}" r="3.5" fill="${color}"/>`;
    svg.innerHTML = h;

    const step2 = Math.max(1, Math.ceil(n/4));
    const shown = [];
    for (let i = 0; i < n; i += step2) shown.push(labels[i]);
    if (labels[n-1] !== shown[shown.length-1]) shown.push(labels[n-1]);
    document.getElementById('chart-x-labels').innerHTML =
      shown.map(l=>`<span>${l}</span>`).join('');
  }

  async function loadStockNews(ticker) {
    const newsEl = document.getElementById('stock-news');
    newsEl.innerHTML = '<div style="color:#94a3b8;font-size:12px;padding:16px 0;text-align:center">불러오는 중...</div>';
    try {
      const res = await fetch(`${API_BASE}/news?ticker=${ticker}&days=90`, { headers: _apiHeaders() });
      const data = res.ok ? await res.json() : [];
      if (!data.length) {
        newsEl.innerHTML = '<div style="color:#94a3b8;font-size:12px;padding:16px 0;text-align:center">관련 뉴스가 없습니다.</div>';
        return;
      }
      newsEl.innerHTML = data.map(n => `
        <div class="news-item" style="padding:12px 0">
          <div class="news-meta">
            <span class="ticker-tag">${n.ticker}</span>
            <span class="news-date">${n.date_str}</span>
            <span class="news-source">${n.source}</span>
          </div>
          <div class="news-title" style="font-size:13px">${n.title}</div>
          <div class="news-body" style="margin-top:3px">${n.body}</div>
        </div>
      `).join('');
    } catch {
      newsEl.innerHTML = '<div style="color:#dc2626;font-size:12px;padding:16px 0;text-align:center">뉴스를 불러오지 못했습니다.</div>';
    }
  }

  document.getElementById('period-sel').addEventListener('click', async e => {
    const btn = e.target.closest('[data-p]');
    if (!btn) return;
    currentPeriod = btn.dataset.p;
    document.querySelectorAll('#period-sel [data-p]').forEach(b => b.classList.toggle('active', b===btn));
    await loadStockChart(currentStock, currentPeriod);
  });

  renderStockDropdown();
  _showState('empty');
</script>
</body>
</html>
