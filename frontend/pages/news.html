<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WHAi — 뉴스</title>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/pages.css">
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="header" id="main-header"></header>
    <div class="content">

      <div class="other-card mb">
        <div style="display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap">
          <div>
            <div style="font-size:10px;color:#64748b;margin-bottom:3px">종목 / 환율</div>
            <select class="fsel" id="news-ticker">
              <option value="">전체</option>
              <option value="005930">삼성전자 (005930)</option>
              <option value="000660">SK하이닉스 (000660)</option>
              <option value="005380">현대차 (005380)</option>
              <option value="000270">기아 (000270)</option>
              <option value="079550">LIG디펜스앤에어로스페이스 (079550)</option>
              <option value="012450">한화에어로스페이스 (012450)</option>
              <option value="105560">KB금융 (105560)</option>
              <option value="055550">신한지주 (055550)</option>
              <option value="051910">LG화학 (051910)</option>
              <option value="096770">SK이노베이션 (096770)</option>
              <option value="KRW/USD">KRW/USD</option>
              <option value="KRW/EUR">KRW/EUR</option>
              <option value="KRW/JPY">KRW/JPY</option>
              <option value="KRW/CNY">KRW/CNY</option>
              <option value="KRW/CHF">KRW/CHF</option>
              <option value="KRW/GBP">KRW/GBP</option>
            </select>
          </div>
          <div>
            <div style="font-size:10px;color:#64748b;margin-bottom:3px">기간</div>
            <select class="fsel" id="news-period">
              <option value="7">최근 7일</option>
              <option value="30">최근 30일</option>
              <option value="90">최근 90일</option>
            </select>
          </div>
          <button class="btn btn-primary" onclick="renderNews()">검색</button>
        </div>
      </div>

      <div class="other-card">
        <div class="other-card-title">뉴스 목록 <span id="news-count" style="font-size:10px;color:#94a3b8;font-weight:400;text-transform:none"></span></div>
        <div id="news-list"><div style="color:#94a3b8;font-size:12px;padding:16px 0;text-align:center">불러오는 중...</div></div>
      </div>

    </div>
  </div>
</div>

<script src="../js/auth.js"></script>
<script src="../js/nav.js"></script>
<script>
  initLayout('news');

  async function renderNews() {
    const ticker = document.getElementById('news-ticker').value;
    const days = document.getElementById('news-period').value;
    const listEl = document.getElementById('news-list');
    const countEl = document.getElementById('news-count');

    listEl.innerHTML = '<div style="color:#94a3b8;font-size:12px;padding:16px 0;text-align:center">불러오는 중...</div>';

    try {
      const params = new URLSearchParams({ days });
      if (ticker) params.set('ticker', ticker);
      const res = await fetch(`${API_BASE}/news?${params}`, {
        headers: getToken() ? { Authorization: `Bearer ${getToken()}` } : {},
      });
      const data = await res.json();

      countEl.textContent = `총 ${data.length}건`;

      if (data.length === 0) {
        listEl.innerHTML = '<p style="color:#94a3b8;font-size:12px;padding:16px 0;text-align:center">해당 조건의 뉴스가 없습니다.</p>';
        return;
      }

      listEl.innerHTML = data.map(n => `
        <div class="news-item" style="padding:14px 0">
          <div class="news-meta">
            <span class="ticker-tag">${n.ticker}</span>
            <span class="news-date">${n.date_str}</span>
            <span class="news-source">${n.source}</span>
          </div>
          <div class="news-title" style="font-size:14px">${n.title}</div>
          <div class="news-body" style="margin-top:4px">${n.body}</div>
          ${n.ai_summary ? `
          <div class="ai-box" style="margin-top:8px;padding:10px 12px">
            <div class="ai-header" style="margin-bottom:6px">
              <span class="ai-badge" style="font-size:9px">AI 3줄 요약</span>
            </div>
            <div class="ai-text" style="font-size:11px">${n.ai_summary}</div>
          </div>` : ''}
        </div>
      `).join('');
    } catch {
      listEl.innerHTML = '<p style="color:#dc2626;font-size:12px;padding:16px 0;text-align:center">뉴스를 불러오지 못했습니다.</p>';
      countEl.textContent = '';
    }
  }

  renderNews();
</script>
</body>
</html>
