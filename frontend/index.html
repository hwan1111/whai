<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WHAi — 로그인</title>
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <!-- 로그인 카드 -->
  <div class="auth-card" id="login-card">
    <div class="auth-logo">
      <div class="auth-logo-text">WH<span>Ai</span></div>
      <div class="auth-logo-sub">다중 자산 지표 통합 분석 AI</div>
    </div>
    <div class="auth-title">로그인</div>
    <div class="auth-sub">계속하려면 계정에 로그인하세요.</div>
    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label">아이디</label>
        <input class="form-input" type="text" id="login-id" placeholder="아이디 입력" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label class="form-label">비밀번호</label>
        <div class="pw-wrap">
          <input class="form-input" type="password" id="login-pw" placeholder="비밀번호 입력" autocomplete="current-password" required>
          <button type="button" class="eye-btn" onclick="toggleEye('login-pw', this)">👁</button>
        </div>
      </div>
      <div class="auth-error" id="login-error"></div>
      <button class="btn-login" type="submit" id="login-btn">로그인</button>
    </form>
    <div class="auth-hint">
      계정이 없으신가요? <a href="#" class="auth-link" onclick="showRegister()">회원가입</a>
    </div>
  </div>

  <!-- 회원가입 카드 -->
  <div class="auth-card" id="register-card" style="display:none; width:420px;">
    <div class="auth-logo">
      <div class="auth-logo-text">WH<span>Ai</span></div>
      <div class="auth-logo-sub">다중 자산 지표 통합 분석 AI</div>
    </div>
    <div class="auth-title">회원가입</div>
    <div class="auth-sub">새 계정을 만들어 WHAi를 시작하세요.</div>
    <form onsubmit="handleRegister(event)">
      <div class="form-group">
        <label class="form-label">이름 <span class="required">*</span></label>
        <input class="form-input" type="text" id="reg-name" placeholder="이름 입력" required>
      </div>
      <div class="form-group">
        <label class="form-label">아이디 <span class="required">*</span></label>
        <input class="form-input" type="text" id="reg-id" placeholder="영문·숫자 (5~20자)" maxlength="20" autocomplete="off" required>
        <div class="field-hint" id="id-hint"></div>
      </div>
      <div class="form-group">
        <label class="form-label">비밀번호 <span class="required">*</span></label>
        <div class="pw-wrap">
          <input class="form-input" type="password" id="reg-pw" placeholder="5~20자" maxlength="20" required>
          <button type="button" class="eye-btn" onclick="toggleEye('reg-pw', this)">👁</button>
        </div>
        <div class="field-hint" id="pw-hint"></div>
      </div>
      <div class="form-group">
        <label class="form-label">비밀번호 확인 <span class="required">*</span></label>
        <div class="pw-wrap">
          <input class="form-input" type="password" id="reg-pw-confirm" placeholder="비밀번호 재입력" maxlength="20" required>
          <button type="button" class="eye-btn" onclick="toggleEye('reg-pw-confirm', this)">👁</button>
        </div>
        <div class="field-hint" id="pw-confirm-hint"></div>
      </div>
      <div class="form-row">
        <div class="form-group" style="flex:1;">
          <label class="form-label">출생연도</label>
          <select class="form-input" id="reg-birth">
            <option value="">선택 안 함</option>
          </select>
        </div>
        <div class="form-group" style="flex:1;">
          <label class="form-label">성별</label>
          <select class="form-input" id="reg-gender">
            <option value="">선택 안 함</option>
            <option value="M">남성</option>
            <option value="F">여성</option>
            <option value="OTHER">기타</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">투자성향 <span class="optional">(선택)</span></label>
        <div class="invest-group" id="invest-group">
          <div class="invest-option" data-val="SAFE">안정형</div>
          <div class="invest-option" data-val="STAB">안정추구형</div>
          <div class="invest-option" data-val="NEUT">위험중립형</div>
          <div class="invest-option" data-val="GROW">적극투자형</div>
          <div class="invest-option" data-val="AGGR">공격투자형</div>
        </div>
      </div>

      <div class="auth-error" id="register-error"></div>
      <button class="btn-login" type="submit" id="register-btn">가입하기</button>
    </form>
    <div class="auth-hint">
      이미 계정이 있으신가요? <a href="#" class="auth-link" onclick="showLogin()">로그인</a>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    const API = 'http://127.0.0.1:8000/api/v1';

    if (getUser()) window.location.replace('pages/dashboard.html');

    (function fillBirthYear() {
      const sel = document.getElementById('reg-birth');
      const cur = new Date().getFullYear();
      for (let y = cur - 10; y >= 1940; y--) {
        const opt = document.createElement('option');
        opt.value = y;
        opt.textContent = y + '년';
        sel.appendChild(opt);
      }
    })();

    let investListenerAttached = false;
    function showRegister() {
      document.getElementById('login-card').style.display = 'none';
      document.getElementById('register-card').style.display = '';
      if (!investListenerAttached) {
        document.getElementById('invest-group').addEventListener('click', function(e) {
          const opt = e.target.closest('.invest-option');
          if (!opt) return;
          const val = opt.dataset.val;
          selectedInvest = selectedInvest === val ? null : val;
          document.querySelectorAll('#invest-group .invest-option').forEach(o => o.classList.remove('selected'));
          if (selectedInvest) opt.classList.add('selected');
        });
        investListenerAttached = true;
      }
    }

    function showLogin() {
      document.getElementById('register-card').style.display = 'none';
      document.getElementById('login-card').style.display = '';
    }

    // ── 로그인 ──
    async function handleLogin(e) {
      e.preventDefault();
      const user_id = document.getElementById('login-id').value.trim();
      const password = document.getElementById('login-pw').value;
      const errEl = document.getElementById('login-error');
      const btn = document.getElementById('login-btn');

      errEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = '로그인 중...';
      try {
        const res = await fetch(`${API}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_id, password }),
        });
        const data = await res.json();
        if (res.status === 401) {
          errEl.textContent = '아이디 또는 비밀번호가 올바르지 않습니다.';
          errEl.style.display = 'block';
          return;
        }
        if (!res.ok) {
          errEl.textContent = data.detail || '로그인에 실패했습니다.';
          errEl.style.display = 'block';
          return;
        }
        login(data.name, data.user_id, data.access_token);
        window.location.href = 'pages/dashboard.html';
      } catch {
        errEl.textContent = '서버에 연결할 수 없습니다.';
        errEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = '로그인';
      }
    }

    // ── 실시간 검증 ──
    const ID_RE = /^[a-zA-Z0-9]{5,20}$/;
    const ID_RESERVED = new Set(['demo', 'id123', 'admin', 'root', 'system']);
    let idAvailable = false;
    let idCheckTimer = null;

    function setHint(el, type, msg) {
      el.textContent = msg;
      el.className = 'field-hint ' + type;
    }

    let selectedInvest = null;

    document.getElementById('reg-id').addEventListener('input', function () {
      const val = this.value.trim();
      const hint = document.getElementById('id-hint');
      idAvailable = false;
      clearTimeout(idCheckTimer);

      if (!val) { hint.className = 'field-hint'; return; }
      if (!ID_RE.test(val)) {
        setHint(hint, 'err', '영문·숫자만 5~20자로 입력해주세요.');
        return;
      }
      if (ID_RESERVED.has(val.toLowerCase())) {
        setHint(hint, 'err', '사용할 수 없는 아이디입니다.');
        return;
      }
      setHint(hint, 'checking', '확인 중...');
      idCheckTimer = setTimeout(async () => {
        try {
          const res = await fetch(`${API}/auth/check-id?user_id=${encodeURIComponent(val)}`);
          const data = await res.json();
          if (res.status === 503) {
            setHint(hint, 'checking', '중복 확인 불가 (DB 연결 오류)');
            idAvailable = true;
            return;
          }
          if (!res.ok) { hint.className = 'field-hint'; return; }
          if (data.available) {
            setHint(hint, 'ok', '사용 가능한 아이디입니다.');
            idAvailable = true;
          } else {
            setHint(hint, 'err', '이미 사용 중인 아이디입니다.');
          }
        } catch {
          hint.className = 'field-hint';
        }
      }, 400);
    });

    document.getElementById('reg-pw').addEventListener('input', checkPwMatch);
    document.getElementById('reg-pw-confirm').addEventListener('input', checkPwMatch);

    function checkPwMatch() {
      const pw = document.getElementById('reg-pw').value;
      const pwc = document.getElementById('reg-pw-confirm').value;
      const pwHint = document.getElementById('pw-hint');
      const confirmHint = document.getElementById('pw-confirm-hint');

      if (!pw) { pwHint.className = 'field-hint'; }
      else if (pw.length < 5) { setHint(pwHint, 'err', '5자 이상 입력해주세요.'); }
      else { setHint(pwHint, 'ok', '사용 가능한 비밀번호입니다.'); }

      if (!pwc) { confirmHint.className = 'field-hint'; return; }
      if (pw === pwc) { setHint(confirmHint, 'ok', '비밀번호가 일치합니다.'); }
      else { setHint(confirmHint, 'err', '비밀번호가 일치하지 않습니다.'); }
    }

    // ── 회원가입 제출 ──
    async function handleRegister(e) {
      e.preventDefault();
      const pw = document.getElementById('reg-pw').value;
      const pwc = document.getElementById('reg-pw-confirm').value;
      const errEl = document.getElementById('register-error');

      if (pw !== pwc) {
        errEl.textContent = '비밀번호가 일치하지 않습니다.';
        errEl.style.display = 'block';
        return;
      }

      const body = {
        user_id:    document.getElementById('reg-id').value.trim(),
        name:       document.getElementById('reg-name').value.trim(),
        password:   pw,
        birth_year: document.getElementById('reg-birth').value ? parseInt(document.getElementById('reg-birth').value) : null,
        gender:     document.getElementById('reg-gender').value || null,
        invest_type: selectedInvest,
      };

      const btn = document.getElementById('register-btn');
      errEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = '처리 중...';

      try {
        const res = await fetch(`${API}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (!res.ok) {
          const msg = Array.isArray(data.detail)
            ? data.detail.map(d => d.msg).join(', ')
            : (data.detail || '회원가입에 실패했습니다.');
          errEl.textContent = msg;
          errEl.style.display = 'block';
          return;
        }
        alert('회원가입이 완료되었습니다. 로그인해주세요.');
        showLogin();
      } catch {
        errEl.textContent = '서버에 연결할 수 없습니다.';
        errEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = '가입하기';
      }
    }
  </script>
</body>
</html>
