name: portfolio_news_evidence
version: "1.0.0"
description: |
  포트폴리오 종합 분석(portfolio_analysis)의 출력을 입력으로 받아, 그 분석 내용을
  뒷받침하는 최근 한 달 이내 관련 뉴스 링크를 web search 로 찾는 프롬프트.
  반드시 [{ticker, title, url}] JSON 배열만 반환한다(파서 계약).

domain: finance
use_case: portfolio_news_evidence

metadata:
  created_date: "2026-06-15"
  author: "team"
  tags:
    - portfolio
    - news
    - evidence
    - web-search
    - korean-stock

# ── 시스템 프롬프트 ─────────────────────────────────────────────────
system: |
  당신은 한국 주식 포트폴리오 리서치 어시스턴트입니다.
  주어진 포트폴리오 분석 결과를 뒷받침하는 실제 뉴스 기사를 web search 로 찾습니다.
  반드시 실제 기사 URL 과 제목만 사용하고, JSON 배열 형식으로만 응답하세요.

# ── 유저 프롬프트 템플릿 ────────────────────────────────────────────
# 변수(= portfolio_analysis 의 출력 + 보유 종목):
#   {{ holdings }}         - "삼성전자(005930), SK하이닉스(000660)"
#   {{ overall_summary }}  - 분석 종합 요약
#   {{ per_holding }}      - 종목별 코멘트 JSON
#   {{ risk_alignment }}   - 투자성향 적합도
#   {{ suggestions }}      - 제안
# 치환 방식: 정규식 기반 render() — .format() 금지 (JSON 예시의 {} 충돌 방지)
template: |
  아래는 한 투자자 포트폴리오에 대한 분석 결과입니다. 이 분석을 뒷받침하는
  최근 한 달 이내 한국어 뉴스 기사를 종목별 최대 1건씩 web search 로 찾으세요.

  ■ 보유 종목: {{ holdings }}

  ■ 종합 요약: {{ overall_summary }}

  ■ 종목별 코멘트: {{ per_holding }}

  ■ 투자성향 적합도: {{ risk_alignment }}

  ■ 제안: {{ suggestions }}

  위 분석과 직접 관련된 실제 기사만 선택하세요. 반드시 아래 형식의 JSON 배열만
  출력하세요(다른 설명/문장 금지):
  [{"ticker": "<티커>", "title": "<기사 제목>", "url": "<기사 URL>"}]
