services:
  mlflow-server:
    build:
      context: ..
      dockerfile: mlflow/Dockerfile.mlflow
    container_name: whai_mlflow_server
    restart: always
    env_file:
      - ../.env
    ports:
      - "5001:5000"
    volumes:
      - ../config/mlflow/mlflow_auth.ini:/app/config/mlflow_auth.ini:ro
      - ../config/mlflow/certs:/app/config/certs:ro
      - mlflow_artifacts:/app/mlflow-artifacts
      - huggingface_cache:/root/.cache/huggingface
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql+psycopg2://${MLFLOW_DB_USER:-mlflow_user}:${MLFLOW_DB_PASSWORD:-mlflow_password_123}@whai_postgres:5432/mlflow_db
      MLFLOW_DEFAULT_ARTIFACT_ROOT: /app/mlflow-artifacts
      MLFLOW_AUTH_CONFIG_PATH: /app/config/mlflow_auth.ini
      MLFLOW_FLASK_SERVER_SECRET_KEY: ${MLFLOW_FLASK_SERVER_SECRET_KEY}
      MLFLOW_AUTH_ENABLED: "true"
      MLFLOW_SERVER_DISABLE_HOST_VALIDATION: "true"
      MLFLOW_SERVER_CORS_ALLOWED_ORIGINS: "*"
      MLFLOW_HTTP_REQUEST_TIMEOUT: "600"
      MLFLOW_ARTIFACTS_BUCKET: ${MLFLOW_ARTIFACTS_BUCKET:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-ap-northeast-2}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
    command: >
      mlflow server
      --backend-store-uri $${MLFLOW_BACKEND_STORE_URI}
      --default-artifact-root $${MLFLOW_ARTIFACTS_BUCKET:-/app/mlflow-artifacts}
      --app-name basic-auth
      --allowed-hosts "*"
      --host 0.0.0.0
      --port 5000
    networks:
      - whai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  whai-network:
    external: true

volumes:
  mlflow_artifacts:
    driver: local
  huggingface_cache:
    driver: local